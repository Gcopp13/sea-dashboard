  };

  // ── ANVIL SCOREBOARD ──────────────────────────────────────────────────────
  const AnvilScoreboard = ({ anvilData }) => {
    const log = anvilData?.log || [];
    const project = anvilData?.project || 'Anvil';
    const cadenceStr = (anvilData?.cadence || '').toLowerCase();

    // Parse cadence target
    const parseCadence = () => {
      if (!cadenceStr) return null;
      if (cadenceStr.includes('daily') || cadenceStr.includes('7x') || cadenceStr.includes('every day')) return 7;
      const m = cadenceStr.match(/(\d+)x/);
      if (m) return parseInt(m[1]);
      if (cadenceStr.includes('5') || cadenceStr.includes('five')) return 5;
      if (cadenceStr.includes('3') || cadenceStr.includes('three')) return 3;
      if (cadenceStr.includes('4') || cadenceStr.includes('four')) return 4;
      if (cadenceStr.includes('2') || cadenceStr.includes('twice') || cadenceStr.includes('two')) return 2;
      return null;
    };
    const cadenceTarget = parseCadence();

    // Build a set of logged date strings (YYYY-MM-DD) in local time
    const loggedDates = new Set(log.map(e => {
      const d = new Date(e.date);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }));
    const dateKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isLogged = d => loggedDates.has(dateKey(d));

    // Current streak
    const today = new Date(); today.setHours(0,0,0,0);
    let streak = 0;
    const sortedUnique = [...new Set(log.map(e => { const d = new Date(e.date); d.setHours(0,0,0,0); return d.toDateString(); }))].map(s => new Date(s)).sort((a,b) => b-a);
    for (let i = 0; i < sortedUnique.length; i++) {
      const exp = new Date(today); exp.setDate(today.getDate() - i);
      if (sortedUnique[i].toDateString() === exp.toDateString()) streak++;
      else break;
    }

    // This week (Mon–Sun)
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7));
    const weekDays = Array(7).fill(null).map((_, i) => { const d = new Date(weekStart); d.setDate(weekStart.getDate() + i); return d; });
    const weekHits = weekDays.filter(d => isLogged(d)).length;

    // Last 35 days (5 weeks × 7) — start from 34 days ago to today
    const gridStart = new Date(today); gridStart.setDate(today.getDate() - 34);
    // align to Monday
    const dayOfWeek = (gridStart.getDay() + 6) % 7;
    gridStart.setDate(gridStart.getDate() - dayOfWeek);
    const grid = Array(35).fill(null).map((_, i) => { const d = new Date(gridStart); d.setDate(gridStart.getDate() + i); return d; });
    const monthHits = grid.filter(d => isLogged(d) && d <= today).length;

    // Best week
    let bestWeek = 0;
    for (let w = 0; w < 5; w++) {
      const wHits = grid.slice(w*7, w*7+7).filter(d => isLogged(d) && d <= today).length;
      if (wHits > bestWeek) bestWeek = wHits;
    }

    const dayLabels = ['M','T','W','T','F','S','S'];
    const hitColor = '#f97316';
    const missColor = 'rgba(30,41,59,0.8)';
    const futureColor = 'rgba(15,23,42,0.4)';

    return (
      <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
        {/* Header */}
        <div className="flex items-center justify-between mb-4">
          <div>
            <h3 className="text-sm font-bold text-orange-400 uppercase tracking-wide">🔨 Anvil Scoreboard</h3>
            {project && <p className="text-xs text-slate-400 mt-0.5 truncate max-w-[180px]">{project}</p>}
          </div>
          <div className="flex items-center gap-1.5 bg-slate-700/60 rounded-xl px-3 py-2">
            <span className="text-xl">🔥</span>
            <div>
              <p className="text-xl font-black text-white leading-none">{streak}</p>
              <p className="text-xs text-slate-400">streak</p>
            </div>
          </div>
        </div>

        {/* Stats Row */}
        <div className="grid grid-cols-3 gap-2 mb-5">
          {[
            { label: 'This Week', value: cadenceTarget ? `${weekHits}/${cadenceTarget}` : `${weekHits}`, sub: 'sessions', color: weekHits >= (cadenceTarget||1) ? '#10b981' : weekHits > 0 ? '#f59e0b' : '#ef4444' },
            { label: 'Last 35 Days', value: monthHits, sub: 'sessions', color: '#f97316' },
            { label: 'Best Week', value: bestWeek, sub: 'sessions', color: '#a855f7' },
          ].map(s => (
            <div key={s.label} className="bg-slate-700/40 rounded-xl p-3 text-center">
              <p className="text-xs text-slate-400 mb-1">{s.label}</p>
              <p className="text-2xl font-black leading-none" style={{ color: s.color }}>{s.value}</p>
              <p className="text-xs text-slate-500 mt-1">{s.sub}</p>
            </div>
          ))}
        </div>

        {/* This Week Strip */}
        <div className="mb-5">
          <p className="text-xs text-slate-400 font-semibold mb-2 uppercase tracking-wide">This Week</p>
          <div className="flex gap-2">
            {weekDays.map((d, i) => {
              const hit = isLogged(d);
              const isFuture = d > today;
              const isToday = d.toDateString() === today.toDateString();
              return (
                <div key={i} className="flex-1 flex flex-col items-center gap-1">
                  <span className="text-xs text-slate-500">{dayLabels[i]}</span>
                  <div className="w-full aspect-square rounded-lg flex items-center justify-center text-xs font-bold transition-all"
                    style={{
                      background: isFuture ? futureColor : hit ? 'linear-gradient(135deg,#f97316,#ef4444)' : missColor,
                      border: isToday ? '2px solid #f97316' : '1px solid rgba(51,65,85,0.4)',
                      color: hit ? 'white' : isFuture ? '#334155' : '#475569',
                    }}>
                    {isFuture ? '' : hit ? '✓' : d.getDate()}
                  </div>
                </div>
              );
            })}
          </div>
          {cadenceTarget && (
            <div className="mt-2 h-1.5 rounded-full bg-slate-700 overflow-hidden">
              <div className="h-full rounded-full transition-all" style={{ width: `${Math.min(weekHits/cadenceTarget,1)*100}%`, background: weekHits >= cadenceTarget ? 'linear-gradient(90deg,#10b981,#059669)' : 'linear-gradient(90deg,#f97316,#ef4444)' }}/>
            </div>
          )}
        </div>

        {/* 5-Week Heatmap */}
        <div>
          <p className="text-xs text-slate-400 font-semibold mb-2 uppercase tracking-wide">35-Day Heatmap</p>
          <div className="flex gap-1 mb-1">
            {dayLabels.map((l,i) => <div key={i} className="flex-1 text-center text-xs text-slate-600">{l}</div>)}
          </div>
          <div className="space-y-1">
            {[0,1,2,3,4].map(week => (
              <div key={week} className="flex gap-1">
                {grid.slice(week*7, week*7+7).map((d, di) => {
                  const hit = isLogged(d);
                  const isFuture = d > today;
                  const isToday = d.toDateString() === today.toDateString();
                  const intensity = hit ? 1 : 0;
                  return (
                    <div key={di} className="flex-1 rounded-md transition-all"
                      style={{
                        aspectRatio: '1',
                        background: isFuture ? futureColor : hit ? 'linear-gradient(135deg,#f97316,#ef4444)' : missColor,
                        border: isToday ? '1.5px solid #f97316' : '1px solid rgba(51,65,85,0.3)',
                        opacity: isFuture ? 0.3 : 1,
                      }}
                      title={`${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}: ${hit?'Logged':'Not logged'}`}
                    />
                  );
                })}
              </div>
            ))}
          </div>
          <div className="flex items-center gap-2 mt-2 justify-end">
            <span className="text-xs text-slate-500">Miss</span>
            <div className="w-3 h-3 rounded-sm" style={{ background: missColor, border: '1px solid rgba(51,65,85,0.4)' }}/>
            <div className="w-3 h-3 rounded-sm" style={{ background: 'linear-gradient(135deg,#f97316,#ef4444)' }}/>
            <span className="text-xs text-slate-500">Hit</span>
          </div>
        </div>
      </div>
    );
  };

  // ── SCORE VIEW ─────────────────────────────────────────────────────────────
  const ScoreView = ({ data, updateField, weekNum, setWeekNum, setActiveTab, openCoach, onPrint, onMilestone }) => {
    const score = calcSEAScore(data, weekNum-1);
    const wheel = data.weeks[weekNum-1].wheelOfJohn||{family:5,fun:5,fitness:5,finance:5,faith:5};

    const TROPHIES = [
      // Foundation
      {id:'first-week',icon:'🎯',title:'Foundation Built',desc:'Completed your first weekly ritual',check:()=>data.weeks.some(w=>w.wins.some(x=>x.trim())&&w.focus?.trim())},
      {id:'goals-set',icon:'🏹',title:'Goal Setter',desc:'All 4 goals defined with measurements',check:()=>data.goals.filter(g=>g.title?.trim()&&g.measurement?.trim()).length>=3},
      {id:'5-weeks',icon:'📅',title:'5-Week Warrior',desc:'Planned 5 or more weeks',check:()=>data.weeks.filter(w=>w.wins.some(x=>x.trim())||w.focus?.trim()).length>=5},
      {id:'10-weeks',icon:'🗓️',title:'10-Week Warrior',desc:'Planned 10 or more weeks',check:()=>data.weeks.filter(w=>w.wins.some(x=>x.trim())||w.focus?.trim()).length>=10},
      // Anvil
      {id:'anvil-7',icon:'🔥',title:'7-Day Streak',desc:'Kept the Anvil going for 7 consecutive days',check:()=>{const log=data.anvilProject?.log||[];if(!log.length)return false;const now=new Date();now.setHours(0,0,0,0);const u=[...new Set(log.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d.toDateString()}))].map(s=>new Date(s)).sort((a,b)=>b-a);let str=0;for(let i=0;i<u.length;i++){const exp=new Date(now);exp.setDate(now.getDate()-i);if(u[i].toDateString()===exp.toDateString())str++;else break;}return str>=7;}},
      {id:'anvil-21',icon:'🔥🔥',title:'21-Day Streak',desc:'Kept the Anvil going for 21 consecutive days',check:()=>{const log=data.anvilProject?.log||[];if(!log.length)return false;const now=new Date();now.setHours(0,0,0,0);const u=[...new Set(log.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d.toDateString()}))].map(s=>new Date(s)).sort((a,b)=>b-a);let str=0;for(let i=0;i<u.length;i++){const exp=new Date(now);exp.setDate(now.getDate()-i);if(u[i].toDateString()===exp.toDateString())str++;else break;}return str>=21;}},
      {id:'anvil-30',icon:'💎',title:'30-Day Legend',desc:'30 consecutive days on your Anvil',check:()=>{const log=data.anvilProject?.log||[];if(!log.length)return false;const now=new Date();now.setHours(0,0,0,0);const u=[...new Set(log.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d.toDateString()}))].map(s=>new Date(s)).sort((a,b)=>b-a);let str=0;for(let i=0;i<u.length;i++){const exp=new Date(now);exp.setDate(now.getDate()-i);if(u[i].toDateString()===exp.toDateString())str++;else break;}return str>=30;}},
      {id:'anvil-50',icon:'🏔️',title:'50 Sessions',desc:'Logged 50 Anvil sessions',check:()=>(data.anvilProject?.log||[]).length>=50},
      // Scoring
      {id:'score-80',icon:'⭐',title:'S.E.A. Excellence',desc:'Scored 80+ in a week',check:()=>score.total>=80},
      {id:'score-90',icon:'🌟',title:'S.E.A. Elite',desc:'Scored 90+ in a week',check:()=>score.total>=90},
      {id:'score-100',icon:'🏆',title:'Perfect Score',desc:'Scored 100 — flawless execution',check:()=>score.total>=100},
      // Habits
      {id:'habit-full',icon:'💪',title:'Perfect Week',desc:'100% habit completion in any week',check:()=>data.weeks.some(w=>{const acts=(w.aActivities||[]).filter(a=>a.name?.trim());return acts.length>0&&acts.every(a=>(a.days||[]).filter(Boolean).length===7);})},
      {id:'habit-5',icon:'🔄',title:'Habit Builder',desc:'Tracking 5 or more habits',check:()=>data.weeks.some(w=>(w.aActivities||[]).filter(a=>a.name?.trim()).length>=5)},
      // Wheel
      {id:'wheel-8',icon:'⚖️',title:'Wheel Balance',desc:'Averaged 8+ on the Wheel of John',check:()=>data.weeks.some(w=>w.wheelOfJohn&&Object.values(w.wheelOfJohn).reduce((a,b)=>a+(b||5),0)/5>=8)},
      // Goals
      {id:'goal-25',icon:'🌱',title:'First Step',desc:'Hit 25% on any goal',check:()=>data.goals.some(g=>g.title?.trim()&&(g.completion||0)>=25)},
      {id:'goal-50',icon:'🚀',title:'Halfway There',desc:'Hit 50% on any goal',check:()=>data.goals.some(g=>g.title?.trim()&&(g.completion||0)>=50)},
      {id:'goal-100',icon:'🎉',title:'Goal Achieved!',desc:'Hit 100% on any goal',check:()=>data.goals.some(g=>g.title?.trim()&&(g.completion||0)>=100)},
      // Reflection & Notes
      {id:'notes-10',icon:'📝',title:'Reflective Leader',desc:'Written 10 or more journal notes',check:()=>(data.notes||[]).length>=10},
      {id:'reflection-7',icon:'🧘',title:'Deep Thinker',desc:'Answered the reflection prompt 7 days',check:()=>data.dailyPlans.flat().filter(d=>d?.reflection?.trim()).length>=7},
      // Sharing
      {id:'sharer',icon:'🤝',title:'Accountability Partner',desc:'Shared your score with someone',check:()=>!!localStorage.getItem('share-used')},
    ];

    const COMPONENTS = [
      {label:'Habit Completion',value:score.habitPct+'%',max:30,earned:Math.round(score.habitPct*0.3),color:'#f59e0b'},
      {label:'Anvil Streak',value:score.anvilStreak+' days',max:25,earned:Math.round(Math.min(score.anvilStreak/30,1)*25),color:'#f97316'},
      {label:'Wheel Average',value:score.wheelAvg,max:20,earned:Math.round((parseFloat(score.wheelAvg)/10)*20),color:'#6366f1'},
      {label:'Weekly Ritual',value:score.ritualDone?'Done':'Not done',max:15,earned:score.ritualDone?15:0,color:'#10b981'},
      {label:'Goal Progress',value:score.goalAvg+'%',max:10,earned:Math.round(score.goalAvg*0.1),color:'#3b82f6'},
    ];

    const [shareCopied, setShareCopied] = useState(false);
    const [shareUrl, setShareUrl] = useState('');
    const [showShareModal, setShowShareModal] = useState(false);

    const generateShareLink = () => {
      const weeksWithData = data.weeks.filter(w=>w.wins?.some(x=>x.trim())||w.focus?.trim());
      const latestWeek = weeksWithData.length > 0 ? weeksWithData[weeksWithData.length-1] : data.weeks[0];
      const shareData = {
        n: localStorage.getItem('summary-name') || '',
        s: score.total,
        as: score.anvilStreak,
        hp: score.habitPct,
        wa: score.wheelAvg,
        ap: data.anvilProject?.project || '',
        w: (latestWeek?.wins||[]).filter(x=>x.trim()),
        g: data.goals.filter(g=>g.title?.trim()).map(g=>({t:g.title,c:g.completion||0})),
        d: new Date().toISOString().split('T')[0]
      };
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(shareData))))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
      const url = `${window.location.origin}${window.location.pathname}?share=${encoded}`;
      const firstName = shareData.n?.split(' ')[0] || '';
      const shareText = `${firstName ? firstName + "'s " : ''}S.E.A. Score this week: ${score.total}/100${score.anvilStreak > 0 ? ' 🔥 ' + score.anvilStreak + ' day streak' : ''}`;

      if (navigator.share) {
        navigator.share({ title: 'My S.E.A. Dashboard Score', text: shareText, url }).catch(()=>{});
        localStorage.setItem('share-used','true');
      } else {
        localStorage.setItem('share-used','true');
        setShareUrl(url);
        setShowShareModal(true);
      }
    };

    return (
      <div className="page-content px-4 py-5 space-y-5">
        {/* Big Score */}
        <div className="rounded-3xl p-6 text-center" style={{background:'linear-gradient(135deg,#1e1b4b,#0f172a)',border:'1px solid rgba(99,102,241,0.3)'}}>
          <div className="flex justify-between items-center mb-1 no-print">
            <button onClick={generateShareLink} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold text-green-400 border border-green-500/30 hover:bg-green-500/10 transition-all">
              {shareCopied ? '✓ Link Copied!' : '📤 Share Score'}
            </button>
            <button onClick={onPrint} className="p-2 rounded-xl bg-white/10 hover:bg-white/20 text-white/60 hover:text-white transition-all" title="Print Score"><PrintIcon/></button>
          </div>
          <p className="text-slate-400 text-sm mb-2">S.E.A. Score — Week {weekNum}</p>
          <StarRating score={score.total} size={36}/>
          <div className="text-6xl font-black text-white mt-3 mb-1">{score.total}</div>
          <p className="text-slate-400 text-sm">out of 100</p>
          <button onClick={()=>openCoach({section:'score',score})} className="no-print mt-4 flex items-center gap-2 mx-auto px-4 py-2 rounded-xl text-sm text-purple-300 border border-purple-500/30" style={{background:'rgba(139,92,246,0.1)'}}>
            <BotIcon/> Talk to coach about this
          </button>
        </div>

        {/* Setup */}
        {section==='setup' && (

              <h3 className="text-sm font-bold text-purple-400 mb-1">🎛️ Coach Personality</h3>
              {(()=>{

              {data.startDate&&(()=>{const[y,m,d]=data.startDate.split('-').map(Number);const s=new Date(y,m-1,d);const dow=s.getDay();if(dow!==1){const adj=dow===0?1:8-dow;s.setDate(s.getDate()+adj);}const e=new Date(s);e.setDate(s.getDate()+119);return(<div className="mt-2 p-3 bg-slate-700/30 rounded-xl"><p className="text-xs text-slate-400">Week 1 starts: <span className="text-white font-medium">{s.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</span></p><p className="text-xs text-slate-400 mt-1">Ends: <span className="text-white font-medium">{e.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</span></p>{dow!==1&&<p className="text-xs text-yellow-400 mt-1">⚠️ Adjusted to nearest Monday</p>}</div>);})()}

  };

  // ── MAIN APP ───────────────────────────────────────────────────────────────
  const calcWeekNum = (startDate) => {
    if (!startDate) return 1;
    const [y,m,d] = startDate.split('-').map(Number);
    const start = new Date(y, m-1, d);
    const dow = start.getDay();
    if (dow !== 1) { const adj = dow===0?1:8-dow; start.setDate(start.getDate()+adj); }
    const now = new Date(); now.setHours(0,0,0,0);
    const diffDays = Math.floor((now - start) / (24*60*60*1000));
    const week = Math.floor(diffDays / 7) + 1;
    return Math.max(1, Math.min(17, week));
  };

  const SEAPlannerApp = ({ onboardingData, onReopenOnboarding }) => {
    const [activeTab, setActiveTab] = useState('today');
    const [weekNum, setWeekNum]     = useState(1);

    const [anvilModal, setAnvilModal] = useState(false);
    const [anvilEntry, setAnvilEntry] = useState('');
    const [anvilDate, setAnvilDate] = useState('');
    const [milestone, setMilestone] = useState(null); // {title, pct}
    const [coachPersonality, setCoachPersonality] = useState(()=>{try{const s=localStorage.getItem('coach-personality');return s?JSON.parse(s):{style:2,tone:2,approach:2,energy:2};}catch(e){return{style:2,tone:2,approach:2,energy:2};}});
    const saveTimer = useRef(null);

    const createDay = () => ({aActivities:['','','',''],grateful:['','',''],wins:['','',''],tomorrowPriorities:['','',''],tasks:[{text:'',done:false,reminder:''},{text:'',done:false,reminder:''},{text:'',done:false,reminder:''}],notes:'',reflection:'',hardThings:'',hardThingsCompleted:false,stillness:'',stillnessCompleted:false,study:'',studyCompleted:false,todaysWins:['','','']});
    const createWeek = () => ({wins:['','',''],improvements:'',focus:'',goalPriorities:['','','',''],aActivities:Array(3).fill(null).map(()=>({name:'',days:[false,false,false,false,false,false,false]})),messes:Array(3).fill(null).map(()=>({description:'',nextSteps:'',byWhen:'',completed:false})),wheelOfJohn:{family:5,fun:5,fitness:5,finance:5,faith:5}});

    const [data, setData] = useState({
      slightEdge:'',yearTheme:'',vision3Year:'',vision1Year:'',vision120Day:'',
      goals:[{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''}],
      weekByDesign:{monday:{theme:''},tuesday:{theme:''},wednesday:{theme:''},thursday:{theme:''},friday:{theme:''}},
      weeks:Array(17).fill(null).map(()=>createWeek()),
      dailyPlans:Array(17).fill(null).map(()=>Array(7).fill(null).map(()=>createDay())),
      anvilProject:{project:'',cadence:'',why:'',log:[]},
      notes:[],startDate:''
    });

    useEffect(()=>{
      try{const s=localStorage.getItem('sea-planner-data');if(s)setData(JSON.parse(s));}
      catch(e){console.log('Fresh start');}
      finally{setLoading(false);}
    },[]);

    // Auto-calculate correct week number once data is loaded
    useEffect(()=>{
      if (!loading && data.startDate) {
        setWeekNum(calcWeekNum(data.startDate));
      }
    },[loading, data.startDate]);

    useEffect(()=>{
      if(onboardingData&&!loading){
        setData(prev=>{
          const nw=JSON.parse(JSON.stringify(prev.weeks));
          if(onboardingData.wheelOfJohn)nw[0].wheelOfJohn=onboardingData.wheelOfJohn;
          return{...prev,slightEdge:onboardingData.slightEdge||prev.slightEdge,yearTheme:onboardingData.yearTheme||prev.yearTheme,vision120Day:onboardingData.vision120Day||prev.vision120Day,goals:onboardingData.goals?.some(g=>g.title)?onboardingData.goals:prev.goals,weeks:nw,anvilProject:onboardingData.anvil?.project?{...prev.anvilProject,...onboardingData.anvil,log:prev.anvilProject?.log||[]}:prev.anvilProject,startDate:onboardingData.startDate||prev.startDate};
        });
        if (onboardingData.personality) {
          setCoachPersonality(onboardingData.personality);
          localStorage.setItem('coach-personality', JSON.stringify(onboardingData.personality));
        }
        if (onboardingData.apiKey) {
          localStorage.setItem('claude-api-key', onboardingData.apiKey);
        }

    },[onboardingData,loading]);

    const saveData = useCallback((d)=>{
      try{localStorage.setItem('sea-planner-data',JSON.stringify(d||data));setSaveStatus('Saved ✓');setTimeout(()=>setSaveStatus(''),2000);}
      catch(e){setSaveStatus('Error');}
    },[data]);

    useEffect(()=>{
      if(loading)return;
      if(saveTimer.current)clearTimeout(saveTimer.current);

    const updateField = (path,value)=>{
      setData(prev=>{
        const n=JSON.parse(JSON.stringify(prev));
        if(typeof path==='string'&&!path.includes('.')){n[path]=value;return n;}
        const keys=path.split('.');let cur=n;
        for(let i=0;i<keys.length-1;i++)cur=cur[keys[i]];

      });

    const openCoach=(ctx)=>{setCoachCtx(ctx);setCoachOpen(true);};

    const printTab = () => {

      const log = data.anvilProject?.log || [];
      if (!log.length) return 0;
      const now = new Date(); now.setHours(0,0,0,0);
      const unique = [...new Set(log.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d.toDateString();}))]
        .map(s=>new Date(s)).sort((a,b)=>b-a);
      let streak = 0;
      for (let i=0;i<unique.length;i++){const exp=new Date(now);exp.setDate(now.getDate()-i);if(unique[i].toDateString()===exp.toDateString())streak++;else break;}
      return streak;
    };

    const logAnvil = () => {
      if (!anvilEntry.trim()) return;
      const dateToLog = anvilDate ? new Date(anvilDate + 'T12:00:00').toISOString() : new Date().toISOString();
      const newLog = [{date:dateToLog,note:anvilEntry.trim()}, ...(data.anvilProject?.log||[])];

        {/* Proactive Check-In Modal — impossible to miss */}
        {popup&&(

            <div className="max-w-sm w-full pop-in" style={{animation:'popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)'}}>
              {/* Pulsing glow ring */}
              <div className="rounded-3xl p-0.5 ring-pulse" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6,#3b82f6)',backgroundSize:'200%'}}>
                <div className="bg-slate-900 rounded-3xl p-6">
                  {/* Label row */}
                  <div className="flex items-center gap-2 mb-4">
                    <span className="text-3xl">{popup._emoji||'🤖'}</span>
                    <div>
                      <p className="text-xs font-black uppercase tracking-widest" style={{color:'#a78bfa'}}>{popup._label||'AI Coach'}</p>
                      <p className="text-xs text-slate-500">{new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</p>
                    </div>
                  </div>
                  {/* Message */}
                  <p className="text-white text-base leading-relaxed font-medium mb-6">{popup.content||popup}</p>
                  {/* Actions */}
                  <div className="space-y-2">
                    <button onClick={()=>{setPopup(null);setCoachOpen(true);}} className="w-full py-4 rounded-2xl font-black text-white text-sm tracking-wide" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>
                      💬 Reply to Coach
                    </button>
                    <button onClick={()=>setPopup(null)} className="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white rounded-2xl text-sm transition-colors">
                      Got it — Dismiss

                  </div>

        {/* Goal Milestone Celebration */}
        {milestone && (

                {milestone.pct===100?'🏆':milestone.pct===75?'🔥':milestone.pct===50?'⭐':'🎯'}

        <AICoach isOpen={coachOpen} onClose={()=>setCoachOpen(false)} plannerData={data} currentContext={coachCtx} onUnreadChange={setCoachBadge} onProactiveMessage={setPopup} personality={coachPersonality}/>

        {/* Header */}
        <div className="sticky top-0 z-40 no-print" style={{background:'rgba(15,23,42,0.95)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(51,65,85,0.5)'}}>

            <div className="flex items-center gap-2">
              {saveStatus&&<span className="text-xs text-slate-500">{saveStatus}</span>}
              <button onClick={()=>openCoach({section:activeTab})} className="relative p-2.5 rounded-2xl" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>
                <BotIcon/>
                {coachBadge>0&&<span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-xs text-white flex items-center justify-center font-bold">{coachBadge}</span>}
              </button>
            </div>
          </div>
        </div>

        {/* Content */}
        <div className="max-w-2xl mx-auto">
          {activeTab==='today'&&<TodayView data={data} updateField={updateField} weekNum={weekNum} dayIdx={dayIdx} setDayIdx={setDayIdx} openCoach={openCoach} score={score} onPrint={printTab}/>}
          {activeTab==='week'&&<WeekView data={data} updateField={updateField} weekNum={weekNum} setWeekNum={setWeekNum} openCoach={openCoach} onPrint={printTab} onMilestone={setMilestone}/>}
          {activeTab==='score'&&<ScoreView data={data} updateField={updateField} weekNum={weekNum} setWeekNum={setWeekNum} setActiveTab={setActiveTab} openCoach={openCoach} onPrint={printTab} onMilestone={setMilestone}/>}
          {activeTab==='more'&&<MoreView data={data} updateField={updateField} saveData={saveData} openCoach={openCoach} personality={coachPersonality} setPersonality={setCoachPersonality} onReopenOnboarding={onReopenOnboarding} onMilestone={setMilestone}/>}
        </div>

        {/* Anvil FAB */}
        <div className="fixed z-40 no-print" style={{bottom:'90px',right:'20px'}}>
          <button onClick={()=>setAnvilModal(true)}
            className="w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transition-all active:scale-95 relative"
            style={{background:loggedToday()?'linear-gradient(135deg,#10b981,#059669)':'linear-gradient(135deg,#f97316,#ef4444)'}}>
            <span className="text-2xl">&#x1F528;</span>
            {getAnvilStreak()>0&&(
              <span className="absolute -top-1 -right-1 min-w-5 h-5 px-1 rounded-full text-xs font-black text-white flex items-center justify-center" style={{background:'#f59e0b',fontSize:'10px'}}>
                {getAnvilStreak()}
              </span>
            )}
          </button>
        </div>

        {/* Anvil Quick-Log Modal */}
        {anvilModal&&(
          <div className="fixed inset-0 z-50 flex items-end justify-center no-print" style={{backgroundColor:'rgba(0,0,0,0.7)'}} onClick={()=>setAnvilModal(false)}>
            <div className="w-full max-w-2xl bg-slate-800 rounded-t-3xl p-6 pb-10 shadow-2xl" style={{borderTop:'1px solid rgba(249,115,22,0.4)'}} onClick={e=>e.stopPropagation()}>
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                  <span className="text-3xl">&#x1F528;</span>
                  <div>
                    <h3 className="font-bold text-white">{data.anvilProject?.project||'Anvil Project'}</h3>
                    <p className="text-xs text-slate-400">
                      {loggedToday()?'Logged today':'Not logged today'}
                      {getAnvilStreak()>0&&<span className="ml-2 text-orange-400">&#x1F525; {getAnvilStreak()} day streak</span>}
                    </p>
                  </div>
                </div>
                <button onClick={()=>setAnvilModal(false)} className="p-2 text-slate-500 hover:text-white text-xl">x</button>
              </div>
              <textarea value={anvilEntry} onChange={e=>setAnvilEntry(e.target.value)}
                placeholder={data.anvilProject?.project?'What did you work on?':'Log your anvil session...'}
                rows={3}
                className="w-full bg-slate-700/50 border border-slate-600/50 rounded-2xl p-4 text-white placeholder-slate-500 text-sm resize-none focus:border-orange-500 focus:outline-none mb-3"/>
              <div className="flex items-center gap-2 mb-4">
                <label className="text-xs text-slate-400 flex-shrink-0">Date:</label>
                <input type="date" value={anvilDate} max={new Date().toISOString().split('T')[0]}
                  onChange={e=>setAnvilDate(e.target.value)}
                  className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-2 text-white text-sm focus:border-orange-500 focus:outline-none"/>
                <button onClick={()=>setAnvilDate('')} className={`text-xs px-2 py-1 rounded-lg transition-colors ${!anvilDate?'bg-orange-500/20 text-orange-400 font-bold':'bg-slate-700 text-slate-400 hover:text-white'}`}>Today</button>
              </div>
              {anvilDate && (
                <p className="text-xs text-orange-300 mb-3 text-center">📅 Logging for {new Date(anvilDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p>
              )}
              <button onClick={logAnvil} disabled={!anvilEntry.trim()}
                className="w-full py-4 rounded-2xl font-bold text-white text-base disabled:opacity-40 transition-all"
                style={{background:'linear-gradient(135deg,#f97316,#ef4444)'}}>
                {anvilDate ? 'Log for Past Date ✓' : 'Log Anvil ✓'}
              </button>
            </div>
          </div>
        )}

        {/* Bottom Nav */}
        <div className="fixed bottom-0 left-0 right-0 z-40 no-print" style={{background:'rgba(15,23,42,0.97)',backdropFilter:'blur(16px)',borderTop:'1px solid rgba(51,65,85,0.5)'}}>
          <div className="max-w-2xl mx-auto flex">
            {TABS.map(({id,label,Icon})=>{
              const active=activeTab===id;
              return(
                <button key={id} onClick={()=>setActiveTab(id)} className="flex-1 flex flex-col items-center py-3 gap-1 transition-all" style={active?{color:'#60a5fa'}:{color:'#475569'}}>
                  <Icon/>
                  <span className="text-xs font-medium">{label}</span>
                  {active&&<div className="w-1 h-1 rounded-full bg-blue-400"/>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  // ── SHARE VIEW ─────────────────────────────────────────────────────────────
  const ShareView = ({ shareData }) => {
    const name = shareData.name || shareData.n || '';
    const score = shareData.score || shareData.s || 0;
    const anvilStreak = shareData.anvilStreak ?? shareData.as ?? 0;
    const habitPct = shareData.habitPct ?? shareData.hp ?? 0;
    const wheelAvg = shareData.wheelAvg || shareData.wa || '0';
    const anvilProject = shareData.anvilProject || shareData.ap || '';
    const wins = shareData.wins || shareData.w || [];
    const goals = (shareData.goals || shareData.g || []).map(g=>({
      title: g.title || g.t || '',
      completion: g.completion ?? g.c ?? 0
    }));
    const sharedAt = shareData.sharedAt || shareData.d || '';
    const scoreColor = score >= 80 ? '#10b981' : score >= 60 ? '#f59e0b' : score >= 40 ? '#f97316' : '#ef4444';
    const stars = score >= 80 ? 5 : score >= 60 ? 4 : score >= 40 ? 3 : score >= 20 ? 2 : 1;
    const goalColors = ['#f97316','#3b82f6','#10b981','#a855f7'];
    const sharedDate = sharedAt ? new Date(sharedAt).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}) : '';
    return (
      <div className="min-h-screen px-4 py-8 max-w-lg mx-auto space-y-5" style={{background:'#0f172a'}}>
        {/* Header */}
        <div className="text-center mb-2">
          <h1 className="font-black text-2xl mb-1" style={{background:'linear-gradient(135deg,#60a5fa,#a78bfa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>S.E.A. Dashboard</h1>
          <p className="text-slate-400 text-xs">Getting Results Inc.</p>
          {sharedDate && <p className="text-slate-500 text-xs mt-1">Shared on {sharedDate}</p>}
        </div>

        {/* Name + Score */}
        <div className="rounded-3xl p-6 text-center" style={{background:'linear-gradient(135deg,#1e1b4b,#0f172a)',border:`1px solid ${scoreColor}40`}}>
          {name && <p className="text-slate-300 text-sm font-semibold mb-3">{name}'s Weekly Score</p>}
          <StarRating score={score} size={32}/>
          <div className="text-6xl font-black mt-3 mb-1" style={{color:scoreColor}}>{score}</div>
          <p className="text-slate-400 text-sm">out of 100</p>
        </div>

        {/* Stats Row */}
        <div className="grid grid-cols-3 gap-3">
          {[
            {label:'Anvil Streak', value:anvilStreak, suffix:'days', icon:'🔥', color:'#f97316'},
            {label:'Habit Rate',   value:habitPct+'%', suffix:'done', icon:'💪', color:'#f59e0b'},
            {label:'Wheel Avg',    value:wheelAvg,     suffix:'/10',  icon:'⚖️', color:'#6366f1'},
          ].map(s=>(
            <div key={s.label} className="bg-slate-800/60 rounded-2xl p-4 text-center border border-slate-700">
              <p className="text-xs text-slate-400 mb-1">{s.label}</p>
              <p className="text-xl font-black" style={{color:s.color}}>{s.value}</p>
              <p className="text-xs text-slate-500">{s.suffix}</p>
            </div>
          ))}
        </div>

        {/* Anvil */}
        {anvilProject && (
          <div className="bg-slate-800/60 rounded-2xl p-4 border border-slate-700 flex items-center gap-3">
            <span className="text-2xl">🔨</span>
            <div>
              <p className="text-xs text-orange-400 font-bold uppercase tracking-wide mb-0.5">Anvil Project</p>
              <p className="text-white text-sm font-semibold">{anvilProject}</p>
              <p className="text-slate-400 text-xs">{anvilStreak} day streak</p>
            </div>
          </div>
        )}

        {/* Wins */}
        {wins?.length > 0 && (
          <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
            <h3 className="text-xs font-bold text-green-400 uppercase tracking-wide mb-3">This Week's Wins</h3>
            <div className="space-y-2">
              {wins.map((w,i)=>(
                <div key={i} className="flex items-start gap-3">
                  <span className="text-green-400 font-bold text-sm flex-shrink-0">✓</span>
                  <p className="text-sm text-slate-200">{w}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Goals */}
        {goals?.filter(g=>g.title).length > 0 && (
          <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
            <h3 className="text-xs font-bold text-orange-400 uppercase tracking-wide mb-4">Goal Progress</h3>
            <div className="space-y-4">
              {goals.filter(g=>g.title).map((g,i)=>{
                const col = goalColors[i%4];
                return (
                  <div key={i}>
                    <div className="flex justify-between items-center mb-1">
                      <span className="text-sm text-white font-medium truncate mr-4">{g.title}</span>
                      <span className="text-sm font-bold flex-shrink-0" style={{color:col}}>{g.completion||0}%</span>
                    </div>
                    <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                      <div className="h-full rounded-full" style={{width:`${g.completion||0}%`,backgroundColor:col}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Footer */}
        <div className="text-center py-4">
          <p className="text-xs text-slate-500 mb-3">This is a read-only snapshot shared from the S.E.A. Dashboard</p>
          <a href={window.location.pathname} className="inline-block px-5 py-2.5 rounded-xl text-sm font-bold text-white" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>
            Open My S.E.A. Dashboard →
          </a>
        </div>
      </div>
    );
  };

  // ── APP ROOT ───────────────────────────────────────────────────────────────
  const AppRoot = () => {
    // Check for share link first
    const urlParams = new URLSearchParams(window.location.search);
    const shareParam = urlParams.get('share');
    if (shareParam) {
      try {
        const padded = shareParam.replace(/-/g,'+').replace(/_/g,'/');
        const shareData = JSON.parse(decodeURIComponent(escape(atob(padded))));
        return <ShareView shareData={shareData}/>;
      } catch(e) {
        // Bad share link — fall through to normal app
      }
    }

    const [onboardingDone, setOnboardingDone] = useState(false);
    const [onboardingData, setOnboardingData] = useState(null);
    const [showingOnboarding, setShowingOnboarding] = useState(false);
    const hasData = ()=>{try{const s=localStorage.getItem('sea-planner-data');if(!s)return false;const p=JSON.parse(s);return!!(p.slightEdge||p.goals?.some(g=>g.title));}catch(e){return false;}};
    const [showOnboarding] = useState(()=>!hasData());

    const getExistingData = () => {
      try {
        const s = localStorage.getItem('sea-planner-data');
        const p = s ? JSON.parse(s) : {};
        const pers = localStorage.getItem('coach-personality');
        return {
          slightEdge: p.slightEdge||'', yearTheme: p.yearTheme||'',
          vision120Day: p.vision120Day||'', startDate: p.startDate||'',
          goals: p.goals||[{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''}],
          wheelOfJohn: p.weeks?.[0]?.wheelOfJohn||{family:5,fun:5,fitness:5,finance:5,faith:5},
          anvil: p.anvilProject ? {project:p.anvilProject.project||'',cadence:p.anvilProject.cadence||'',why:p.anvilProject.why||''} : {project:'',cadence:'',why:''},
          personality: pers ? JSON.parse(pers) : {style:2,tone:2,approach:2,energy:2},
          apiKey: localStorage.getItem('claude-api-key')||''
        };
      } catch(e) { return {slightEdge:'',yearTheme:'',vision120Day:'',startDate:'',goals:[{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''}],anvil:{project:'',cadence:'',why:''},personality:{style:2,tone:2,approach:2,energy:2}}; }
    };

    const handleOnboardingComplete = (d) => { setOnboardingData(d); setOnboardingDone(true); setShowingOnboarding(false); };
    const handleReopenOnboarding = () => setShowingOnboarding(true);

    if ((showOnboarding && !onboardingDone) || showingOnboarding) {
      return <OnboardingFlow onComplete={handleOnboardingComplete} initialData={getExistingData()}/>;
    }
    return <SEAPlannerApp onboardingData={onboardingData} onReopenOnboarding={handleReopenOnboarding}/>;
  };

  ReactDOM.render(<AppRoot/>, document.getElementById('root'));
</script>
</body>
</html>
