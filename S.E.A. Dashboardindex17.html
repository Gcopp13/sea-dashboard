<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>S.E.A. Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: white; overscroll-behavior: none; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    .page-content { padding-bottom: 110px; }
    input, textarea, select { font-size: 16px !important; }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes confetti-fall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    .pop-in { animation: popIn 0.3s ease-out; }
    .slide-up { animation: slideUp 0.3s ease-out; }
    .ring-pulse { animation: pulse-ring 2s ease-in-out infinite; }
    .confetti-piece { position: fixed; top: -20px; width: 10px; height: 10px; animation: confetti-fall 3s ease-in forwards; z-index: 9999; pointer-events: none; border-radius: 2px; }
    @media (max-width: 768px) {
      .coach-panel { position: fixed; bottom: 0; left: 0; right: 0; max-height: 85vh; max-height: 85dvh; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; z-index: 60; padding-bottom: env(safe-area-inset-bottom, 0px); transition: bottom 0.15s ease, max-height 0.15s ease; }
      .coach-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 55; }
      .coach-input-bar { padding-bottom: max(1rem, env(safe-area-inset-bottom, 1rem)); }
    }
    @media (min-width: 769px) {
      .coach-panel { position: fixed; right: 0; top: 0; height: 100vh; width: 400px; border-left: 1px solid #334155; z-index: 60; }
    }
    @media print {
      /* Hide all chrome */
      .no-print, .no-print * { display: none !important; }

      /* Light mode for paper */
      body { background: white !important; color: #0f172a !important; margin: 0; padding: 0; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

      /* Remove sticky/fixed positioning */
      .sticky, [style*="position: fixed"], [style*="position:fixed"] { position: static !important; }

      /* Content area — full width, no bottom padding */
      .page-content { padding-bottom: 0 !important; }
      .max-w-2xl { max-width: 100% !important; margin: 0 !important; padding: 0 8px !important; }

      /* Print header */
      .print-header { display: block !important; }

      /* Cards readable on white */
      .bg-slate-800\/60, [class*="bg-slate-8"], [class*="bg-slate-7"] {
        background: #f8fafc !important;
        border-color: #e2e8f0 !important;
      }

      /* Text colors on white */
      .text-white { color: #0f172a !important; }
      .text-slate-400 { color: #64748b !important; }
      .text-slate-300 { color: #475569 !important; }
      .text-slate-500 { color: #94a3b8 !important; }

      /* Inputs readable */
      input, textarea { 
        background: #f1f5f9 !important; 
        border: 1px solid #cbd5e1 !important; 
        color: #0f172a !important;
        -webkit-text-fill-color: #0f172a !important;
      }

      /* Page breaks */
      .print-break { page-break-before: always; }

      /* Keep colors on badges/scores */
      [style*="color: #"] { }
    }
  </style>
</head>
<body>
<div id="root"></div>
<div class="print-header" style="display:none; padding: 16px 8px 8px; border-bottom: 2px solid #e2e8f0; margin-bottom: 16px;">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div>
      <h1 style="font-size:20px; font-weight:900; color:#0f172a; margin:0;">S.E.A. Dashboard</h1>
      <p style="font-size:11px; color:#64748b; margin:2px 0 0;">Getting Results Inc. · Printed <span id="print-date"></span></p>
    </div>
    <div style="font-size:11px; color:#64748b; text-align:right;">
      <p style="margin:0;">Strategic · Executable · Accountable</p>
    </div>
  </div>
</div>
<script>document.getElementById('print-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});</script>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;

  // ── Icons ──────────────────────────────────────────────────────────────────
  const Icon = ({ d, size = 22, stroke = 2, fill = "none" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
      {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p}/>) : <path d={d}/>}
    </svg>
  );
  const SunIcon    = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
  const CalIcon    = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
  const StarIcon   = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
  const MenuIcon   = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
  const BotIcon    = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="15" x2="8" y2="15"/><line x1="12" y1="15" x2="12" y2="15"/><line x1="16" y1="15" x2="16" y2="15"/></svg>;
  const SendIcon   = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
  const XIcon      = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
  const SetIcon    = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>;
  const ChevRight  = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>;
  const ChevLeft   = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>;
  const CheckIcon  = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>;
  const FireIcon   = () => <span style={{fontSize:'28px'}}>🔥</span>;
  const TrophyIcon = () => <span style={{fontSize:'24px'}}>🏆</span>;
  const PrintIcon  = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;

  // ── Confetti ───────────────────────────────────────────────────────────────
  const Confetti = ({ active }) => {
    if (!active) return null;
    const colors = ['#f43f5e','#f59e0b','#10b981','#3b82f6','#a855f7','#ec4899'];
    return (
      <div style={{pointerEvents:'none',position:'fixed',inset:0,zIndex:9999,overflow:'hidden'}}>
        {Array(40).fill(null).map((_,i) => (
          <div key={i} className="confetti-piece" style={{
            left: `${Math.random()*100}%`,
            backgroundColor: colors[Math.floor(Math.random()*colors.length)],
            animationDelay: `${Math.random()*2}s`,
            animationDuration: `${2+Math.random()*2}s`,
            transform: `rotate(${Math.random()*360}deg)`,
            width: `${6+Math.random()*8}px`,
            height: `${6+Math.random()*8}px`,
          }}/>
        ))}
      </div>
    );
  };

  // ── Streak Ring ────────────────────────────────────────────────────────────
  const StreakRing = ({ name, days, color, size = 64 }) => {
    const done = (days || []).filter(Boolean).length;
    const total = 7;
    const pct = done / total;
    const r = (size / 2) - 6;
    const circ = 2 * Math.PI * r;
    const dash = circ * pct;
    return (
      <div className="flex flex-col items-center gap-1">
        <div className="relative" style={{width:size,height:size}}>
          <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth="5"/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color}
              strokeWidth="5" strokeDasharray={`${dash} ${circ}`}
              strokeLinecap="round" style={{transition:'stroke-dasharray 0.5s ease'}}/>
          </svg>
          <div className="absolute inset-0 flex items-center justify-center">
            <span className="text-sm font-bold text-white">{done}/7</span>
          </div>
        </div>
        <span className="text-xs text-slate-400 text-center" style={{maxWidth:size,wordBreak:'break-word'}}>{name}</span>
      </div>
    );
  };

  // ── Star Rating ────────────────────────────────────────────────────────────
  const StarRating = ({ score, size = 32 }) => {
    const stars = Math.round(score / 20);
    return (
      <div className="flex gap-1">
        {[1,2,3,4,5].map(s => (
          <svg key={s} width={size} height={size} viewBox="0 0 24 24"
            fill={s <= stars ? '#f59e0b' : 'none'}
            stroke={s <= stars ? '#f59e0b' : '#475569'} strokeWidth="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        ))}
      </div>
    );
  };

  // ── Wheel Radar (mini) ─────────────────────────────────────────────────────
  const MiniRadar = ({ scores, size = 180 }) => {
    const cx = size/2, cy = size/2, maxR = size*0.38;
    const toRad = d => d*Math.PI/180;
    const cats = [
      {key:'family',color:'#f43f5e',angle:-90},{key:'fun',color:'#f59e0b',angle:-18},
      {key:'fitness',color:'#10b981',angle:54},{key:'finance',color:'#3b82f6',angle:126},
      {key:'faith',color:'#a855f7',angle:198}
    ];
    const pt = (angle,val) => ({ x: cx+(val/10)*maxR*Math.cos(toRad(angle)), y: cy+(val/10)*maxR*Math.sin(toRad(angle)) });
    const poly = pts => pts.map(p=>`${p.x},${p.y}`).join(' ');
    const grid = v => cats.map(c=>pt(c.angle,v));
    const scorePts = cats.map(c=>pt(c.angle,scores[c.key]||5));
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {[2,4,6,8,10].map(v=><polygon key={v} points={poly(grid(v))} fill="none" stroke="#1e293b" strokeWidth="1"/>)}
        {cats.map(c=>{const e=pt(c.angle,10);return<line key={c.key} x1={cx} y1={cy} x2={e.x} y2={e.y} stroke="#1e293b" strokeWidth="1"/>;} )}
        <polygon points={poly(scorePts)} fill="rgba(99,102,241,0.2)" stroke="#6366f1" strokeWidth="2"/>
        {scorePts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill={cats[i].color} stroke="#0f172a" strokeWidth="1.5"/>)}
        {cats.map(c=>{const lp=pt(c.angle,12.5);return<text key={c.key} x={lp.x} y={lp.y+4} textAnchor={lp.x<cx-5?'end':lp.x>cx+5?'start':'middle'} fill={c.color} fontSize="10" fontWeight="600">{c.key.charAt(0).toUpperCase()+c.key.slice(1)}</text>;})}
      </svg>
    );
  };

  // ── SCORING ENGINE ─────────────────────────────────────────────────────────
  const calcSEAScore = (data, weekIdx) => {
    const week = data.weeks[weekIdx];
    // 1. Habit completion (30pts)
    const acts = (week.aActivities||[]).filter(a=>a.name&&a.name.trim());
    const habitPct = acts.length > 0
      ? acts.reduce((s,a)=>s+(a.days||[]).filter(Boolean).length,0)/(acts.length*7)
      : 0;
    const habitScore = habitPct * 30;
    // 2. Anvil streak (25pts)
    const log = data.anvilProject?.log || [];
    let streak = 0;
    if (log.length > 0) {
      const today = new Date(); today.setHours(0,0,0,0);
      const sorted = log.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d;}).sort((a,b)=>b-a);
      const unique = [...new Set(sorted.map(d=>d.toDateString()))].map(s=>new Date(s));
      for (let i=0;i<unique.length;i++){const exp=new Date(today);exp.setDate(today.getDate()-i);if(unique[i].toDateString()===exp.toDateString())streak++;else break;}
    }
    const anvilScore = Math.min(streak/30,1)*25;
    // 3. Wheel avg (20pts)
    const w = week.wheelOfJohn||{family:5,fun:5,fitness:5,finance:5,faith:5};
    const wheelAvg = Object.values(w).reduce((a,b)=>a+(b||5),0)/5;
    const wheelScore = (wheelAvg/10)*20;
    // 4. Weekly ritual (15pts)
    const ritualDone = week.wins.some(x=>x.trim()) && week.focus && week.focus.trim() && week.goalPriorities.some(x=>x.trim());
    const ritualScore = ritualDone ? 15 : 0;
    // 5. Goal progress (10pts)
    const goals = data.goals.filter(g=>g.title&&g.title.trim());
    const goalAvg = goals.length > 0 ? goals.reduce((s,g)=>s+(g.completion||0),0)/goals.length : 0;
    const goalScore = (goalAvg/100)*10;
    const total = Math.round(habitScore+anvilScore+wheelScore+ritualScore+goalScore);
    return { total, stars: total>=80?5:total>=60?4:total>=40?3:total>=20?2:1, habitPct:Math.round(habitPct*100), anvilStreak:streak, wheelAvg:wheelAvg.toFixed(1), ritualDone, goalAvg:Math.round(goalAvg) };
  };

  // ── AI COACH ──────────────────────────────────────────────────────────────
  const AICoach = ({ isOpen, onClose, plannerData, currentContext, onUnreadChange, onProactiveMessage, personality }) => {
    const [messages, setMessages] = useState([]);
    const [input, setInput] = useState('');
    const [loading, setLoading] = useState(false);
    const [apiKey, setApiKey] = useState('');
    const [showSettings, setShowSettings] = useState(false);
    const [unread, setUnread] = useState(0);
    const endRef = useRef(null);

    const setupCheckDone = useRef(false);
    const setupCheckTimer = useRef(null);
    const plannerDataRef = useRef(plannerData);

    // Keep ref current so the delayed check always reads latest data
    useEffect(() => { plannerDataRef.current = plannerData; }, [plannerData]);

    useEffect(() => {
      const k = localStorage.getItem('claude-api-key');
      if (k) setApiKey(k);
      const saved = localStorage.getItem('ai-coach-messages');
      if (saved) { setMessages(JSON.parse(saved)); setupCheckDone.current = true; }
      checkAccountabilityTriggers();
    }, []);

    // Debounced setup check — waits for plannerData to settle before evaluating
    useEffect(() => {
      if (setupCheckDone.current) return;
      const saved = localStorage.getItem('ai-coach-messages');
      if (saved) { setupCheckDone.current = true; return; }
      if (setupCheckTimer.current) clearTimeout(setupCheckTimer.current);
      setupCheckTimer.current = setTimeout(() => {
        if (setupCheckDone.current) return;
        setupCheckDone.current = true;
        // Use ref so we always read the latest plannerData, not a stale closure
        const d = plannerDataRef.current;
        const lastCheck = localStorage.getItem('last-trigger-check');
        const now = new Date().toISOString();
        if (lastCheck && new Date(now).getDate() === new Date(lastCheck).getDate()) return;
        const t = [];
        if (!d.slightEdge?.trim()) t.push({ role:'assistant', content:"Your Slight Edges aren't defined yet — these are the daily habits that compound and give you an edge over time. Things like working out, reading, journaling. What are yours? Head to More → Setup to add them." });
        if (!d.goals?.some(g=>g.title?.trim())) t.push({ role:'assistant', content:"Your goals aren't set yet — up to 4 goals for this 120-day period. Specific enough that someone else could tell if you hit them. Ready to define them?" });
        if (!d.vision120Day?.trim()) t.push({ role:'assistant', content:"Your 120-Day Vision is blank. This is who you need to BE in the next 120 days. Want help creating it?" });
        if (!d.anvilProject?.project?.trim()) t.push({ role:'assistant', content:"Your Anvil isn't set yet. What's the one activity that, done consistently, would change everything? Tap More → Anvil to set it up." });
        const weeksWithData = d.weeks?.filter(w=>w.wins?.some(x=>x.trim())||(w.focus?.trim())).length||0;
        if (weeksWithData === 0 && d.slightEdge?.trim()) t.push({ role:'assistant', content:"Foundation is set but no weekly planning yet. The weekly ritual is where S.E.A. comes alive. Head to the Week tab to start!" });
        if (t.length > 0) { addTriggers(t); localStorage.setItem('last-trigger-check', now); }
      }, 800);
      return () => clearTimeout(setupCheckTimer.current);
    }, [plannerData]);

    useEffect(() => {
      if (isOpen && currentContext?.test && apiKey) {
        const testMsg = { role:'user', content:"Send me a short intro message as my coach — let me feel your style." };
        setMessages(prev=>{
          const already = prev.some(m=>m.content===testMsg.content);
          if(already) return prev;
          return [...prev, testMsg];
        });
        setTimeout(async ()=>{
          setLoading(true);
          try {
            const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:buildSystemPrompt(),messages:[{role:'user',content:'Send me a short intro message as my coach — let me feel your style.'}]})});
            if(!res.ok) throw new Error(await res.text());
            const d=await res.json();
            if(d.content?.[0]) setMessages(prev=>[...prev,{role:'assistant',content:d.content[0].text}]);
          } catch(e){console.log('Test error',e);}
          finally{setLoading(false);}
        },300);
      }
    }, [isOpen, currentContext]);

    useEffect(() => {
      if (messages.length > 0) localStorage.setItem('ai-coach-messages', JSON.stringify(messages));
      endRef.current?.scrollIntoView({ behavior: 'smooth' });
    }, [messages]);

    useEffect(() => { if (isOpen) { setUnread(0); if (onUnreadChange) onUnreadChange(0); } }, [isOpen]);
    useEffect(() => { if (onUnreadChange) onUnreadChange(unread); }, [unread]);

    // iOS keyboard fix — shift panel up when keyboard appears
    useEffect(() => {
      if (!isOpen || !window.visualViewport) return;
      const panel = document.querySelector('.coach-panel');
      const handleViewportResize = () => {
        if (!panel) return;
        const keyboardHeight = Math.max(0, window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop);
        if (window.innerWidth <= 768) {
          panel.style.bottom = keyboardHeight > 50 ? `${keyboardHeight}px` : '0px';
          panel.style.maxHeight = `${window.visualViewport.height * 0.92}px`;
        }
      };
      window.visualViewport.addEventListener('resize', handleViewportResize);
      window.visualViewport.addEventListener('scroll', handleViewportResize);
      return () => {
        window.visualViewport.removeEventListener('resize', handleViewportResize);
        window.visualViewport.removeEventListener('scroll', handleViewportResize);
        if (panel) { panel.style.bottom = ''; panel.style.maxHeight = ''; }
      };
    }, [isOpen]);

    const addTriggers = (triggers) => {
      if (!triggers.length) return;
      setMessages(prev => [...prev, ...triggers]);
      setUnread(prev => prev + triggers.length);
    };

    const checkSetupTriggers = () => {
      const lastCheck = localStorage.getItem('last-trigger-check');
      const now = new Date().toISOString();
      if (lastCheck && new Date(now).getDate() === new Date(lastCheck).getDate()) return;
      const t = [];
      if (!plannerData.slightEdge?.trim()) t.push({ role:'assistant', content:"Your Slight Edges aren't defined yet — these are the daily habits that compound and give you an edge over time. Things like working out, reading, journaling. What are yours? Head to More → Setup to add them." });
      if (!plannerData.goals.some(g=>g.title?.trim())) t.push({ role:'assistant', content:"Your goals aren't set yet — up to 4 goals for this 120-day period. Specific enough that someone else could tell if you hit them. Ready to define them?" });
      if (!plannerData.vision120Day?.trim()) t.push({ role:'assistant', content:"Your 120-Day Vision is blank. This is who you need to BE in the next 120 days. Want help creating it?" });
      if (!plannerData.anvilProject?.project?.trim()) t.push({ role:'assistant', content:"Your Anvil isn't set yet. What's the one activity that, done consistently, would change everything? Tap More → Anvil to set it up." });
      const weeksWithData = plannerData.weeks.filter(w=>w.wins.some(x=>x.trim())||(w.focus?.trim())).length;
      if (weeksWithData === 0 && plannerData.slightEdge?.trim()) t.push({ role:'assistant', content:"Foundation is set but no weekly planning yet. The weekly ritual is where S.E.A. comes alive. Head to the Week tab to start!" });
      if (t.length > 0) { addTriggers(t); localStorage.setItem('last-trigger-check', now); }
    };

    const checkAccountabilityTriggers = () => {
      const today = new Date();
      const dow = today.getDay();
      const hour = today.getHours();
      const t = [];
      const mKey = 'morning-' + today.toDateString();
      if (hour >= 5 && hour < 11 && !localStorage.getItem(mKey)) {
        const g = plannerData.goals.filter(g=>g.title?.trim());
        if (g.length > 0) {
          t.push({ role:'assistant', content:`Good morning! What is the ONE thing you do today that moves the needle on "${g[0].title}"? Name the specific action.`, _type:'morning', _label:'Morning Check-In', _emoji:'🌅' });
          localStorage.setItem(mKey, 'true');
        }
      }
      const mdKey = 'midday-' + today.toDateString();
      if (hour >= 11 && hour < 14 && !localStorage.getItem(mdKey)) {
        const anvil = plannerData.anvilProject?.project || 'your Anvil';
        const g = plannerData.goals.filter(g=>g.title?.trim());
        const goalText = g.length > 0 ? ` on "${g[0].title}"` : '';
        t.push({ role:'assistant', content:`Midday check — how's your energy and focus right now? Have you made progress${goalText} yet today? If not, what's one thing you can knock out in the next 90 minutes?`, _type:'midday', _label:'Midday Check-In', _emoji:'☀️' });
        localStorage.setItem(mdKey, 'true');
      }
      const eKey = 'evening-' + today.toDateString();
      if (hour >= 17 && hour < 22 && !localStorage.getItem(eKey)) {
        const anvil = plannerData.anvilProject?.project || 'your Anvil';
        t.push({ role:'assistant', content:`End of day — did you work on ${anvil} today? Scale of 1-10, how intentional was today? What's one thing you'd do differently tomorrow?`, _type:'evening', _label:'Evening Check-In', _emoji:'🌙' });
        localStorage.setItem(eKey, 'true');
      }
      const wKey = 'weekly-plan-' + today.toDateString();
      if (dow === 0 && hour >= 7 && hour < 14 && !localStorage.getItem(wKey)) {
        t.push({ role:'assistant', content:"Sunday morning — have you planned your week yet? 15 minutes in the Week tab now saves you hours of drift all week. The week is waiting.", _type:'sunday', _label:'Sunday Planning', _emoji:'📋' });
        localStorage.setItem(wKey, 'true');
      }
      const weeksTracked = plannerData.weeks.filter(w=>w.wins.some(x=>x.trim())||(w.focus?.trim())).length;
      const recent = plannerData.weeks.slice(0,Math.max(weeksTracked,1)).slice(-3);
      if (recent.length >= 2) {
        const issues = {};
        recent.forEach(w=>(w.aActivities||[]).forEach(a=>{if(!a.name?.trim())return;const d=(a.days||[]).filter(Boolean).length;if(d<3)issues[a.name]=(issues[a.name]||0)+1;}));
        const struggling = Object.entries(issues).filter(([,v])=>v>=2).map(([k])=>k);
        const pKey = 'pattern-' + today.toDateString();
        if (struggling.length > 0 && !localStorage.getItem(pKey)) {
          t.push({ role:'assistant', content:`Pattern alert — "${struggling[0]}" has been below 3 days for multiple weeks. Is the habit wrong, the cadence wrong, or are you just not executing? What's really going on?`, _type:'pattern', _label:'Pattern Alert', _emoji:'⚠️' });
          localStorage.setItem(pKey, 'true');
        }
      }
      if (t.length > 0) {
        addTriggers(t);
        if (onProactiveMessage) setTimeout(()=>onProactiveMessage(t[0]), 1500);
      }
    };

    const buildSystemPrompt = () => {
      const p = personality || {style:2,tone:2,approach:2,energy:2};
      const styleLabel = p.style<=1?'a hands-on coach who pushes for action':p.style>=3?'a strategic advisor who informs and guides':'a coaching advisor who balances pushing with guidance';
      const toneLabel = p.tone<=1?'deeply empathetic and emotionally warm — acknowledge feelings first':p.tone>=3?'direct and no-nonsense — skip the fluff, get to the point':'warm but direct — brief acknowledgment then straight to substance';
      const approachLabel = p.approach<=1?'supportive and accepting — meet them where they are, celebrate progress':'high-standards and challenging — push hard, expect more, call out excuses';
      const energyLabel = p.energy<=1?'calm and measured — steady, thoughtful, no hype':p.energy>=3?'fired up and intense — high energy, urgent, motivational':'steady with clear urgency — focused energy, no wasted words';
      const personalitySummary = `COACH PERSONALITY (user-configured):
- Style: Act as ${styleLabel}
- Tone: Be ${toneLabel}
- Approach: Be ${approachLabel}
- Energy: Be ${energyLabel}`;

      // Build rich session memory so coach never repeats generic setup questions
      const weeksWithData = plannerData.weeks.filter(w=>w.wins.some(x=>x.trim())||w.focus?.trim());
      const latestWeek = weeksWithData.length > 0 ? weeksWithData[weeksWithData.length-1] : null;
      const recentWins = latestWeek?.wins?.filter(x=>x.trim()).join(', ') || 'None logged';
      const recentFocus = latestWeek?.focus || 'Not set';
      const anvilStreak = (()=>{
        const log = plannerData.anvilProject?.log||[];
        if(!log.length) return 0;
        const now=new Date();now.setHours(0,0,0,0);
        const unique=[...new Set(log.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d.toDateString()}))].map(s=>new Date(s)).sort((a,b)=>b-a);
        let streak=0;
        for(let i=0;i<unique.length;i++){const exp=new Date(now);exp.setDate(now.getDate()-i);if(unique[i].toDateString()===exp.toDateString())streak++;else break;}
        return streak;
      })();
      const habitSummary = (()=>{
        const acts=(latestWeek?.aActivities||[]).filter(a=>a.name?.trim());
        if(!acts.length) return 'No habits tracked';
        return acts.map(a=>`${a.name} (${(a.days||[]).filter(Boolean).length}/7 days)`).join(', ');
      })();
      const goalSummary = plannerData.goals.filter(g=>g.title?.trim()).map((g,i)=>`${i+1}. ${g.title} (${g.completion||0}%)`).join(', ') || 'No goals set';
      const latestWheel = (()=>{
        const w=[...plannerData.weeks].reverse().find(wk=>wk.wheelOfJohn&&Object.values(wk.wheelOfJohn).some(v=>v!==5));
        return w?Object.entries(w.wheelOfJohn).map(([k,v])=>`${k}:${v}`).join(', '):'Not scored';
      })();
      const sessionMemory = `
SESSION MEMORY (use this to avoid repeating questions you've already asked):
- Weeks planned: ${weeksWithData.length} of 17
- Latest weekly focus: ${recentFocus}
- Latest wins logged: ${recentWins}
- Current Anvil streak: ${anvilStreak} days
- Latest habits: ${habitSummary}
- Slight Edge habits: ${plannerData.slightEdge||'Not defined'}
- Year Theme: ${plannerData.yearTheme||'Not set'}
- 120-Day Vision: ${plannerData.vision120Day||'Not defined'}
- Goals: ${goalSummary}
- Wheel of Life: ${latestWheel}
- Anvil project: ${plannerData.anvilProject?.project||'Not set'} | Cadence: ${plannerData.anvilProject?.cadence||'Not set'} | Total sessions: ${plannerData.anvilProject?.log?.length||0}
- Current context: ${currentContext?JSON.stringify(currentContext):'General'}

IMPORTANT: Do NOT ask the user to set up things they have already set up. Do NOT ask generic onboarding questions if the data above shows they have completed setup. Instead reference what you know about them specifically.`;

      return `You are the AI coaching assistant inside the S.E.A. Dashboard for a financial advisor. Results-focused.

PHILOSOPHY: "Structure sets you free" | "Live by design, not default" | "Strategy without execution is hallucination"
S.E.A.: Strategic (12X thinking) | Executable (next action NOW) | Accountable (weekly scorecards)
FIVE CATEGORIES: Family | Fun | Fitness | Finance | Faith
PRIORITY TREE: You → Spouse → Kids → Staff → Clients → Community

${personalitySummary}
${sessionMemory}

ACCOUNTABILITY: Call out avoidance. Name slipping habits. Follow up on commitments. Never let them off the hook.
RESPONSE: One powerful question per response. 2-4 sentences max. Match the personality settings above precisely.
DONT: Give financial advice. Make decisions for them. Be a cheerleader without substance. Ask questions you already know the answer to from SESSION MEMORY.`;
    };

    // Trim messages sent to API to last 12 to avoid token limits
    // Full history still shows on screen — only trimmed on the wire
    const buildApiMessages = (allMessages, newMsg) => {
      const combined = [...allMessages, newMsg].filter(m=>m.role==='user'||m.role==='assistant');
      const trimmed = combined.slice(-12);
      // Ensure first message is always from user (API requirement)
      const firstUserIdx = trimmed.findIndex(m=>m.role==='user');
      const valid = firstUserIdx >= 0 ? trimmed.slice(firstUserIdx) : trimmed;
      return valid.map(({role,content})=>({role,content}));
    };

    const send = async () => {
      if (!input.trim() || !apiKey) { if (!apiKey) alert('Add your API key in settings (⚙️)'); return; }
      const userMsg = { role:'user', content:input };
      setMessages(prev=>[...prev, userMsg]);
      setInput(''); setLoading(true);
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system:buildSystemPrompt(),messages:buildApiMessages(messages,userMsg)})
        });
        if (!res.ok) throw new Error(`${res.status} - ${await res.text()}`);
        const d = await res.json();
        if (d.content?.[0]) setMessages(prev=>[...prev,{role:'assistant',content:d.content[0].text}]);
      } catch(e) { alert('Coach error: ' + e.message); }
      finally { setLoading(false); }
    };

    if (!isOpen) return null;
    return (
      <>
        <div className="coach-overlay md:hidden" onClick={onClose}/>
        <div className="coach-panel bg-slate-900 flex flex-col shadow-2xl">
          <div className="bg-gradient-to-r from-blue-600 to-purple-600 p-4 flex items-center justify-between" style={{borderRadius:'1.5rem 1.5rem 0 0'}}>
            <div className="flex items-center gap-2"><BotIcon/><span className="font-bold text-white">AI Coach</span></div>
            <div className="flex items-center gap-2">
              <button onClick={()=>setShowSettings(!showSettings)} className="p-1.5 hover:bg-white/20 rounded-lg"><SetIcon/></button>
              <button onClick={()=>{if(confirm('Clear conversation?')){setMessages([]);localStorage.removeItem('ai-coach-messages');}}} className="text-xs text-white/70 hover:text-white px-2 py-1 hover:bg-white/20 rounded">Clear</button>
              <button onClick={onClose} className="p-1.5 hover:bg-white/20 rounded-lg"><XIcon/></button>
            </div>
          </div>
          {showSettings && (
            <div className="bg-slate-800 p-4 border-b border-slate-700">
              <label className="text-xs text-slate-400 block mb-1">Claude API Key</label>
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." className="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-sm text-white mb-2"/>
              <button onClick={()=>{localStorage.setItem('claude-api-key',apiKey);setShowSettings(false);}} className="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-semibold">Save</button>
              <p className="text-xs text-slate-500 mt-2">Get key at console.anthropic.com</p>
            </div>
          )}
          <div className="flex-1 overflow-y-auto p-4 space-y-3 chat-messages">
            {messages.length === 0 && <div className="text-center text-slate-500 mt-12"><div className="text-4xl mb-3">🤖</div><p className="text-sm">Your accountability coach is ready.<br/>Ask anything about your S.E.A. plan.</p></div>}
            {messages.map((m,i)=>(
              <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                <div className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${m.role==='user'?'bg-blue-600 text-white':'bg-slate-800 text-slate-200'}`}>{m.content}</div>
              </div>
            ))}
            {loading && <div className="flex justify-start"><div className="bg-slate-800 text-slate-400 rounded-2xl px-4 py-3 text-sm">Thinking...</div></div>}
            <div ref={endRef}/>
          </div>
          <div className="p-4 border-t border-slate-800 coach-input-bar">
            <div className="flex gap-2">
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()} onFocus={()=>setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),400)} placeholder="Ask your coach..." disabled={loading} inputMode="text" className="flex-1 bg-slate-800 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-blue-500 focus:outline-none"/>
              <button onClick={send} disabled={loading||!input.trim()} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white p-3 rounded-xl"><SendIcon/></button>
            </div>
          </div>
        </div>
      </>
    );
  };

  // ── ONBOARDING ─────────────────────────────────────────────────────────────
  const OnboardingFlow = ({ onComplete, initialData }) => {
    const [step, setStep] = useState(0);
    const [showAnvilInfo, setShowAnvilInfo] = useState(false);
    const [showSlightEdgeInfo, setShowSlightEdgeInfo] = useState(false);
    const [showStartDateInfo, setShowStartDateInfo] = useState(false);
    const [form, setForm] = useState({
      slightEdge: initialData.slightEdge||'', yearTheme: initialData.yearTheme||'',
      wheelOfJohn: initialData.wheelOfJohn||{family:5,fun:5,fitness:5,finance:5,faith:5},
      vision120Day: initialData.vision120Day||'',
      goals: initialData.goals||[{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''}],
      anvil: initialData.anvil||{project:'',cadence:'',why:''},
      personality: initialData.personality||{style:2,tone:2,approach:2,energy:2},
      startDate: initialData.startDate||'',
      apiKey: initialData.apiKey||''
    });
    const STEPS = [
      {id:'welcome',isWelcome:true},
      {id:'slightEdge',title:'Your Slight Edge',subtitle:'What habits compound your edge?',desc:"Your Slight Edges are the consistent daily habits that compound over time and quietly separate you from everyone else. Think: what do you do regularly that makes you better? Workout, read, meditate, practice — these are your edges.",prompt:'My Slight Edges are...',placeholder:'e.g. Daily workout, 30 min reading, journaling, practicing guitar, cold outreach calls...',field:'slightEdge',type:'textarea',hasInfo:true},
      {id:'yearTheme',title:'Year Theme',subtitle:'One word or phrase for this year',desc:"Your compass. Every decision this year points back to it. Not a goal — an identity.",prompt:'My year theme is...',placeholder:'e.g. The Year of Execution, Discipline, Breakthrough...',field:'yearTheme',type:'input'},
      {id:'wheel',title:'Wheel of John',subtitle:'Where are you right now?',desc:'Score each life category honestly — not where you want to be, where you ARE. This baseline shapes your vision and goals.',type:'wheel'},
      {id:'vision',title:'120-Day Vision',subtitle:'Who will you BE in 120 days?',desc:"Not what you'll do — who you'll become. Describe that version of yourself.",prompt:'In 120 days, I am someone who...',placeholder:'e.g. I am someone who has built systems that run without me, who shows up fully present for my family...',field:'vision120Day',type:'textarea'},
      {id:'goals',title:'Your Four Goals',subtitle:'Up to 4 goals for this 120-day period',desc:'Set up to 4 goals — specific enough that someone else could tell if you hit them. Quality over quantity.',type:'goals'},
      {id:'anvil',title:'Your Anvil',subtitle:'The one activity that changes everything',type:'anvil'},
      {id:'personality',title:'Your Coach',subtitle:'Set up your coaching style',type:'personality'},
      {id:'startDate',title:'Your 120-Day Start Date',subtitle:'When does your journey begin?',type:'startDate',hasInfo:true},
      {id:'apiKey',title:'Activate Your AI Coach',subtitle:'Connect Claude to power your coaching',type:'apiKey'},
      {id:'complete',isComplete:true}
    ];
    const cur = STEPS[step];
    const progress = (step/(STEPS.length-1))*100;
    const canNext = () => {
      if (cur.isWelcome||cur.isComplete) return true;
      if (cur.field) return form[cur.field].trim().length>0;
      if (cur.type==='goals') return form.goals.some(g=>g.title.trim());
      if (cur.type==='anvil') return form.anvil.project.trim().length>0;
      return true;
    };
    const CATS = [{key:'family',label:'Family',color:'#f43f5e'},{key:'fun',label:'Fun',color:'#f59e0b'},{key:'fitness',label:'Fitness',color:'#10b981'},{key:'finance',label:'Finance',color:'#3b82f6'},{key:'faith',label:'Faith',color:'#a855f7'}];
    return (
      <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%)'}}>
        {!cur.isWelcome && !cur.isComplete && <div className="h-1 bg-slate-800"><div className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500" style={{width:`${progress}%`}}/></div>}
        <div className="flex-1 flex items-center justify-center px-5 py-8">
          <div className="w-full max-w-lg">
            {cur.isWelcome && (
              <div className="text-center slide-up">
                <div className="text-6xl mb-6">🌊</div>
                <h1 className="text-4xl font-bold mb-2" style={{background:'linear-gradient(135deg,#60a5fa,#a78bfa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>S.E.A. Dashboard</h1>
                <p className="text-slate-400 mb-8">Live By Design, Not By Default</p>
                <div className="bg-slate-800/60 rounded-2xl p-6 border border-slate-700 mb-6 text-left space-y-3">
                  <p className="text-white font-semibold">"Structure sets you free."</p>
                  <p className="text-slate-400 text-sm">This planner is built on the S.E.A. Framework — Strategic, Executable, Accountable. 5 minutes to set up. Changes how you operate.</p>

                </div>
                <button onClick={()=>setStep(1)} className="w-full py-4 rounded-2xl font-bold text-lg text-white transition-all" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>Get Started →</button>
                <button onClick={()=>onComplete(form)} className="w-full mt-3 py-2 text-slate-500 hover:text-slate-400 text-sm">Skip setup</button>
              </div>
            )}
            {cur.isComplete && (
              <div className="text-center slide-up">
                <div className="text-6xl mb-4">🎯</div>
                <h2 className="text-3xl font-bold text-white mb-3">Foundation Set.</h2>
                <p className="text-slate-400 mb-6">Here is what to do next:</p>
                <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700 mb-6 text-left space-y-3">
                  {[['📅','Plan your week every Sunday in the Week tab'],['☀️','Open Today every morning to set your top 3'],['🔥','Log your Anvil daily — protect the streak'],['🤖','The AI Coach knows your goals — ask it anything'],['⭐','Check your S.E.A. Score in the Score tab']].map(([icon,text],i)=>(
                    <div key={i} className="flex items-start gap-3"><span className="text-xl">{icon}</span><p className="text-sm text-slate-300">{text}</p></div>
                  ))}

                <button onClick={()=>onComplete(form)} className="w-full py-4 rounded-2xl font-bold text-lg text-white" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>Open My Planner →</button>
              </div>
            )}
            {!cur.isWelcome && !cur.isComplete && (
              <div className="slide-up">
                <div className="flex justify-between items-center mb-4">
                  <span className="text-xs text-slate-500">Step {step} of {STEPS.length-2}</span>

                <div className="bg-slate-800/60 rounded-2xl p-6 border border-slate-700">
                  <div className="flex items-start justify-between mb-1">
                    <h2 className="text-2xl font-bold text-white">{cur.title}</h2>
                    {cur.hasInfo && (
                      <button onClick={()=>setShowSlightEdgeInfo(true)} className="flex-shrink-0 ml-3 w-8 h-8 rounded-full border border-blue-500/50 text-blue-400 hover:bg-blue-500/20 transition-all flex items-center justify-center font-bold text-sm">i</button>
                    )}
                  </div>
                  {cur.subtitle && <p className="text-slate-400 text-sm mb-4">{cur.subtitle}</p>}
                  {cur.desc && <p className="text-slate-300 text-sm leading-relaxed mb-5 p-4 rounded-xl" style={{background:'rgba(59,130,246,0.1)',borderLeft:'3px solid #3b82f6'}}>{cur.desc}</p>}
                  {cur.type==='input' && <div>{cur.prompt&&<label className="text-xs text-slate-500 block mb-2">{cur.prompt}</label>}<input type="text" value={form[cur.field]} onChange={e=>setForm(p=>({...p,[cur.field]:e.target.value}))} onKeyPress={e=>e.key==='Enter'&&canNext()&&setStep(s=>s+1)} placeholder={cur.placeholder} className="w-full bg-slate-700 border border-slate-600 rounded-xl p-4 text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none text-lg"/></div>}
                  {cur.type==='textarea' && <div>{cur.prompt&&<label className="text-xs text-slate-500 block mb-2">{cur.prompt}</label>}<textarea value={form[cur.field]} onChange={e=>setForm(p=>({...p,[cur.field]:e.target.value}))} placeholder={cur.placeholder} rows={4} className="w-full bg-slate-700 border border-slate-600 rounded-xl p-4 text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none resize-none"/></div>}
                  {cur.type==='personality' && (()=>{
                    const p = form.personality;
                    const DIMS = [
                      {key:'style',  label:'Style',    left:'Coach',      right:'Advisor',     leftDesc:'Push & drive',         rightDesc:'Inform & guide',   color:'#3b82f6'},
                      {key:'tone',   label:'Tone',     left:'Empathetic', right:'Direct',      leftDesc:'Warmth first',         rightDesc:'No fluff',         color:'#a855f7'},
                      {key:'approach',label:'Approach',left:'Accepting',  right:'Challenging', leftDesc:'Meet you where you are',rightDesc:'Push harder',      color:'#10b981'},
                      {key:'energy', label:'Energy',   left:'Calm',       right:'Fired Up',    leftDesc:'Steady & measured',    rightDesc:'Intense & urgent', color:'#f59e0b'},
                    ];
                    const summaryWords = [
                      p.style<=1?'Coach-Style':p.style>=3?'Advisor-Style':'Blended',
                      p.tone<=1?'Empathetic':p.tone>=3?'Direct':'Balanced',
                      p.approach<=1?'Accepting':p.approach>=3?'Challenging':'Supportive',
                      p.energy<=1?'Calm':p.energy>=3?'Fired Up':'Focused',
                    ];
                    return (
                      <div>
                        <p className="text-xs text-slate-400 mb-5">Your coach will feel like: <span className="text-purple-300 font-semibold">{summaryWords.join(', ')}</span></p>
                        <div className="space-y-5">
                          {DIMS.map(d=>(
                            <div key={d.key}>
                              <span className="text-xs font-bold text-slate-300 block mb-2">{d.label}</span>
                              <div className="flex items-center gap-3">
                                <div className="text-right w-20 flex-shrink-0">
                                  <p className="text-xs font-semibold text-white">{d.left}</p>
                                  <p className="text-xs text-slate-500">{d.leftDesc}</p>
                                </div>
                                <input type="range" min="0" max="4" step="1" value={p[d.key]}
                                  onChange={e=>setForm(prev=>({...prev,personality:{...prev.personality,[d.key]:parseInt(e.target.value)}}))}
                                  className="flex-1 h-2 rounded-full appearance-none cursor-pointer"
                                  style={{accentColor:d.color}}/>
                                <div className="w-20 flex-shrink-0">
                                  <p className="text-xs font-semibold text-white">{d.right}</p>
                                  <p className="text-xs text-slate-500">{d.rightDesc}</p>
                                </div>
                              </div>
                            </div>

            {[0,1,2].map(i=>(
              <div key={i} className="flex items-center gap-3">
                <span className="text-green-400 text-sm">✦</span>
                <input value={day.grateful[i]||''} onChange={e=>{const g=[...day.grateful];g[i]=e.target.value;updateDay('grateful',g);}} placeholder={`Gratitude ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-green-500 focus:outline-none"/>
              </div>
            ))}
          </div>
        </div>

        {/* Daily Reflection Prompt */}
        {(()=>{
          const PROMPTS = [
            "What would make today a 10 out of 10?",
            "What is the one conversation you've been avoiding that you need to have?",
            "Where are you tolerating mediocrity in your life or business right now?",
            "What habit, if done consistently for 90 days, would change everything?",
            "Who in your life deserves more of your attention and presence?",
            "What are you most afraid of failing at — and why haven't you started?",
            "If you could only work 4 hours today, what would you absolutely have to get done?",
            "What does the best version of you do today that the average version skips?",
            "Where are you spending time that isn't aligned with your goals?",
            "What commitment have you made to yourself that you've been breaking?",
            "What would you do differently if you knew you couldn't fail?",
            "Who do you need to become to achieve your 120-day vision?",
            "What's one thing you can do today to strengthen your most important relationship?",
            "Where is drift showing up in your life right now?",
            "What does winning this week actually look like?",
            "What are you grateful for that you rarely stop to acknowledge?",
            "What's the hardest thing you need to do today — and why are you avoiding it?",
            "How would your future self evaluate the choices you're making right now?",
            "What belief is holding you back that you know isn't true?",
            "What would you need to let go of to move forward?",
          ];
          const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
          const prompt = PROMPTS[dayOfYear % PROMPTS.length];
          return (
            <div className="rounded-2xl px-4 py-4 space-y-3" style={{background:'rgba(139,92,246,0.08)',border:'1px solid rgba(139,92,246,0.25)'}}>

                <p className="text-sm text-slate-200 leading-relaxed font-medium">{prompt}</p>
              </div>
              <textarea

                onChange={e=>updateDay('reflection',e.target.value)}
                placeholder="Write your thoughts here..."

                className="w-full bg-slate-800/60 border border-purple-500/20 rounded-xl p-3 text-white placeholder-slate-500 text-sm resize-none focus:border-purple-500 focus:outline-none"
              />
              {day.reflection?.trim() && (

          <div className="space-y-2">
            {[0,1,2].map(i=>(
              <div key={i} className="flex items-center gap-3">
                <span className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{background:'rgba(59,130,246,0.2)',color:'#60a5fa'}}>{i+1}</span>
                <input value={day.aActivities[i]||''} onChange={e=>{const a=[...day.aActivities];a[i]=e.target.value;updateDay('aActivities',a);}} placeholder={`Priority ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-blue-500 focus:outline-none"/>
              </div>

        {/* Daily Task List */}
        <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
          <div className="flex items-center justify-between mb-4">

            <button onClick={()=>{const t=[...(day.tasks||[])];t.push({text:'',done:false,reminder:''});updateDay('tasks',t);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold text-indigo-400 border border-indigo-500/30 hover:bg-indigo-500/10 transition-all">
              + Add Task
            </button>
          </div>
          <div className="space-y-3">
            {(day.tasks||[{text:'',done:false,reminder:''},{text:'',done:false,reminder:''},{text:'',done:false,reminder:''}]).map((task,ti)=>(
              <div key={ti} className="space-y-1.5">
                <div className="flex items-center gap-2">
                  {/* Checkbox */}
                  <button onClick={()=>{const t=JSON.parse(JSON.stringify(day.tasks||[]));t[ti]={...t[ti],done:!t[ti].done};updateDay('tasks',t);}}
                    className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition-all ${task.done?'border-indigo-500 bg-indigo-500':'border-slate-600 bg-transparent'}`}>
                    {task.done && <span className="text-white text-xs font-black">✓</span>}
                  </button>
                  {/* Task text */}
                  <input value={task.text||''} onChange={e=>{const t=JSON.parse(JSON.stringify(day.tasks||[]));t[ti]={...t[ti],text:e.target.value};updateDay('tasks',t);}}
                    placeholder={`Task ${ti+1}`}
                    className={`flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-2.5 text-sm focus:border-indigo-500 focus:outline-none transition-all ${task.done?'line-through text-slate-500':'text-white'}`}/>
                  {/* Remove */}
                  <button onClick={()=>{const t=JSON.parse(JSON.stringify(day.tasks||[]));t.splice(ti,1);updateDay('tasks',t);}}
                    className="w-7 h-7 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 flex items-center justify-center transition-all text-lg flex-shrink-0">✕</button>
                </div>
                {/* Reminder time */}
                {task.text?.trim() && (
                  <div className="flex items-center gap-2 pl-8">
                    <span className="text-xs text-slate-500">🔔</span>
                    <input type="time" value={task.reminder||''} onChange={e=>{const t=JSON.parse(JSON.stringify(day.tasks||[]));t[ti]={...t[ti],reminder:e.target.value};updateDay('tasks',t);}}
                      className="bg-slate-700/30 border border-slate-600/30 rounded-lg px-2 py-1 text-xs text-slate-400 focus:border-indigo-500 focus:outline-none focus:text-white"/>
                    {task.reminder && <span className="text-xs text-indigo-400">Reminder set for {task.reminder}</span>}
                  </div>
                )}
              </div>
            ))}
            {(day.tasks||[]).length === 0 && (
              <p className="text-center text-slate-500 text-sm py-2">No tasks yet — tap Add Task</p>
            )}
          </div>
          {/* Progress bar */}
          {(day.tasks||[]).some(t=>t.text?.trim()) && (()=>{
            const total = (day.tasks||[]).filter(t=>t.text?.trim()).length;
            const done = (day.tasks||[]).filter(t=>t.text?.trim()&&t.done).length;
            const pct = total > 0 ? Math.round((done/total)*100) : 0;
            return (
              <div className="mt-4 pt-4 border-t border-slate-700">
                <div className="flex justify-between text-xs mb-1.5">
                  <span className="text-slate-400">{done} of {total} completed</span>
                  <span className="font-bold text-indigo-400">{pct}%</span>
                </div>
                <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:pct===100?'linear-gradient(90deg,#10b981,#059669)':'linear-gradient(90deg,#6366f1,#8b5cf6)'}}/>
                </div>
              </div>
            );
          })()}
        </div>

        {/* Notes */}
        <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
          <h3 className="text-sm font-bold text-slate-300 uppercase tracking-wide mb-3">Notes</h3>
          <textarea value={day.notes||''} onChange={e=>updateDay('notes',e.target.value)} placeholder="Thoughts, ideas, observations..." rows={3} className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm resize-none focus:border-slate-400 focus:outline-none"/>
        </div>

        {/* Evening Review */}
        <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
          <h3 className="text-sm font-bold text-orange-400 uppercase tracking-wide mb-4">Evening Review</h3>
          <div className="space-y-4">
            <div>
              <label className="text-xs text-slate-400 block mb-2">Today's Wins</label>
              {[0,1,2].map(i=>(
                <div key={i} className="flex items-center gap-3 mb-2">
                  <span className="text-yellow-400">★</span>
                  <input value={day.todaysWins?.[i]||''} onChange={e=>{const w=day.todaysWins||['','',''];const nw=[...w];nw[i]=e.target.value;updateDay('todaysWins',nw);}} placeholder={`Win ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-yellow-500 focus:outline-none"/>
                </div>
              ))}
            </div>
            {[
              {field:'hardThings',doneField:'hardThingsCompleted',label:'Hard Thing Done Today',placeholder:'What difficult thing did you tackle?',color:'red'},
              {field:'stillness',doneField:'stillnessCompleted',label:'Stillness',placeholder:'Meditation, prayer, quiet time...',color:'indigo'},
              {field:'study',doneField:'studyCompleted',label:'Study',placeholder:'What are you learning?',color:'teal'},
            ].map(({field,doneField,label,placeholder,color})=>(
              <div key={field}>
                <label className="text-xs text-slate-400 block mb-2">{label}</label>
                <div className="flex items-center gap-3">
                  <input value={day[field]||''} onChange={e=>updateDay(field,e.target.value)} placeholder={placeholder} className={`flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-${color}-500 focus:outline-none`}/>
                  <button onClick={()=>updateDay(doneField,!day[doneField])} className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 border transition-all ${day[doneField]?'border-green-500 bg-green-500/20 text-green-400':'border-slate-600 bg-slate-700/50 text-slate-500'}`}>
                    <CheckIcon/>
                  </button>
                </div>
              </div>
            ))}
            <div>
              <h3 className="text-sm font-bold text-purple-400 uppercase tracking-wide mb-2">Tomorrow's Top 3</h3>
              {[0,1,2].map(i=>(
                <div key={i} className="flex items-center gap-3 mb-2">
                  <span className="w-5 h-5 rounded-full bg-blue-500/20 text-blue-400 text-xs flex items-center justify-center font-bold flex-shrink-0">{i+1}</span>
                  <input value={day.tomorrowPriorities?.[i]||''} onChange={e=>{const t=day.tomorrowPriorities||['','',''];const nt=[...t];nt[i]=e.target.value;updateDay('tomorrowPriorities',nt);}} placeholder={`Tomorrow priority ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-blue-500 focus:outline-none"/>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ── WEEK VIEW ──────────────────────────────────────────────────────────────
  const WeekView = ({ data, updateField, weekNum, setWeekNum, openCoach, onPrint, onMilestone }) => {
    const [ritualStep, setRitualStep] = useState(0);
    const [showConfetti, setShowConfetti] = useState(false);
    const week = data.weeks[weekNum-1];
    const updateWeek = (f,v) => { const ws=JSON.parse(JSON.stringify(data.weeks)); ws[weekNum-1][f]=v; updateField('weeks',ws); };

    const getWeekDates = () => {
      if (!data.startDate) return null;
      const [y,m,d]=data.startDate.split('-').map(Number);
      const s=new Date(y,m-1,d); const dow=s.getDay(); if(dow!==1){const adj=dow===0?1:8-dow;s.setDate(s.getDate()+adj);}
      s.setDate(s.getDate()+(weekNum-1)*7);
      const e=new Date(s);e.setDate(s.getDate()+6);
      return `${s.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${e.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
    };

    const RITUAL_STEPS = ['Wins','Improve','Focus + Wheel','Goals','Priorities'];
    const isRitualComplete = week.wins.some(x=>x.trim()) && week.focus?.trim() && week.goalPriorities.some(x=>x.trim());

    const completeRitual = () => {
      setShowConfetti(true);
      setTimeout(()=>setShowConfetti(false),4000);
    };

    const CATS = [{key:'family',label:'Family',color:'#f43f5e'},{key:'fun',label:'Fun',color:'#f59e0b'},{key:'fitness',label:'Fitness',color:'#10b981'},{key:'finance',label:'Finance',color:'#3b82f6'},{key:'faith',label:'Faith',color:'#a855f7'}];
    const wheel = week.wheelOfJohn||{family:5,fun:5,fitness:5,finance:5,faith:5};
    const prevWheel = weekNum>1?(data.weeks[weekNum-2].wheelOfJohn||null):null;

    return (
      <div className="page-content px-4 py-5 space-y-5">
        <Confetti active={showConfetti}/>
        {/* Header */}
        <div className="flex items-center justify-between">
          <div>
            <div className="flex items-center gap-3">
              <button onClick={()=>setWeekNum(Math.max(1,weekNum-1))} disabled={weekNum===1} className="p-2 bg-slate-800 rounded-xl disabled:opacity-30"><ChevLeft/></button>
              <div>
                <h2 className="text-xl font-bold text-white">Week {weekNum} of 17</h2>
                {getWeekDates()&&<p className="text-xs text-slate-400">{getWeekDates()}</p>}
              </div>
              <button onClick={()=>setWeekNum(Math.min(17,weekNum+1))} disabled={weekNum===17} className="p-2 bg-slate-800 rounded-xl disabled:opacity-30"><ChevRight/></button>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={onPrint} className="no-print p-2.5 rounded-xl bg-slate-800/60 border border-slate-700 hover:border-slate-500 text-slate-400 hover:text-white transition-all" title="Print Week"><PrintIcon/></button>
            <button onClick={()=>openCoach({section:'weekly',week:weekNum})} className="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>
              <BotIcon/><span>Coach</span>
            </button>
          </div>
        </div>

        {/* Ritual Progress */}
        <div className="bg-slate-800/60 rounded-2xl p-4 border border-slate-700">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-white">Weekly Ritual</h3>
            {isRitualComplete && <span className="text-xs text-green-400 font-bold">✓ Complete!</span>}
          </div>
          <div className="flex gap-2 mb-4">
            {RITUAL_STEPS.map((s,i)=>(
              <button key={i} onClick={()=>setRitualStep(i)} className={`flex-1 py-2 rounded-xl text-xs font-medium transition-all ${ritualStep===i?'text-white':'text-slate-500 hover:text-slate-300'}`} style={ritualStep===i?{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}:{background:'rgba(30,41,59,0.8)'}}>{i+1}</button>
            ))}
          </div>
          <p className="text-xs text-slate-400 text-center">{RITUAL_STEPS[ritualStep]}</p>
        </div>

        {/* Step 0: Wins */}
        {ritualStep===0 && (
          <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700 slide-up">
            <h3 className="text-sm font-bold text-green-400 uppercase tracking-wide mb-3">Last Week's Wins</h3>
            {[0,1,2].map(i=>(
              <div key={i} className="flex items-center gap-3 mb-2">
                <span className="text-green-400">★</span>
                <input value={week.wins[i]||''} onChange={e=>{const w=[...week.wins];w[i]=e.target.value;updateWeek('wins',w);}} placeholder={`Win ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-green-500 focus:outline-none"/>
              </div>
            ))}
            <button onClick={()=>setRitualStep(1)} className="w-full mt-3 py-3 rounded-xl font-semibold text-white text-sm" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>Next →</button>
          </div>
        )}

        {/* Step 1: Improve */}
        {ritualStep===1 && (
          <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700 slide-up">
            <h3 className="text-sm font-bold text-orange-400 uppercase tracking-wide mb-3">What I Will Improve</h3>
            <textarea value={week.improvements||''} onChange={e=>updateWeek('improvements',e.target.value)} placeholder="What needs improvement this week?" rows={4} className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm resize-none focus:border-orange-500 focus:outline-none"/>
            <div className="flex gap-3 mt-3">
              <button onClick={()=>setRitualStep(0)} className="px-4 py-3 bg-slate-700 rounded-xl text-white text-sm">← Back</button>
              <button onClick={()=>setRitualStep(2)} className="flex-1 py-3 rounded-xl font-semibold text-white text-sm" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>Next →</button>
            </div>
          </div>
        )}

        {/* Step 2: Focus + Wheel */}
        {ritualStep===2 && (
          <div className="space-y-4 slide-up">
            <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
              <h3 className="text-sm font-bold text-purple-400 uppercase tracking-wide mb-3">Weekly Focus</h3>
              <input value={week.focus||''} onChange={e=>updateWeek('focus',e.target.value)} placeholder="Main theme or focus for this week" className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-purple-500 focus:outline-none"/>
            </div>
            <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-sm font-bold text-indigo-400 uppercase tracking-wide">Wheel of John</h3>
                <span className="text-xs text-slate-400">Rate each 1–10</span>
              </div>
              <div className="flex justify-center mb-4"><MiniRadar scores={wheel} size={180}/></div>
              <div className="space-y-3">
                {CATS.map(cat=>{
                  const val=wheel[cat.key]||5;
                  const trend=prevWheel?val-(prevWheel[cat.key]||5):null;
                  const sc=val<=4?'#f87171':val<=6?'#fbbf24':'#34d399';
                  return(
                    <div key={cat.key}>
                      <div className="flex justify-between mb-1">
                        <span className="text-sm font-semibold" style={{color:cat.color}}>{cat.label}</span>
                        <div className="flex items-center gap-2">
                          {trend!==null&&trend!==0&&<span className={`text-xs ${trend>0?'text-green-400':'text-red-400'}`}>{trend>0?`+${trend}`:trend}</span>}
                          <span className="text-base font-bold" style={{color:sc}}>{val}</span>
                        </div>
                      </div>
                      <input type="range" min="1" max="10" value={val} onChange={e=>updateWeek('wheelOfJohn',{...wheel,[cat.key]:parseInt(e.target.value)})} className="w-full h-2 rounded-lg appearance-none cursor-pointer" style={{accentColor:cat.color}}/>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="flex gap-3">
              <button onClick={()=>setRitualStep(1)} className="px-4 py-3 bg-slate-700 rounded-xl text-white text-sm">← Back</button>
              <button onClick={()=>setRitualStep(3)} className="flex-1 py-3 rounded-xl font-semibold text-white text-sm" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>Next →</button>
            </div>
          </div>
        )}

        {/* Step 3: Goal Progress */}
        {ritualStep===3 && (
          <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700 slide-up">
            <h3 className="text-sm font-bold text-green-400 uppercase tracking-wide mb-1">Goal Progress</h3>
            <p className="text-xs text-slate-400 mb-4">Update where you stand on each goal this week</p>
            <div className="space-y-5">
              {data.goals.map((g,i)=>{
                if(!g.title?.trim()) return null;
                const pct = g.completion||0;
                const colors=['#f97316','#3b82f6','#10b981','#a855f7'];
                const col = colors[i];
                return (
                  <div key={i}>
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-sm font-semibold text-white truncate mr-4">{g.title}</span>
                      <span className="text-lg font-black flex-shrink-0" style={{color:col}}>{pct}%</span>
                    </div>
                    <div className="h-3 bg-slate-700 rounded-full overflow-hidden mb-2">
                      <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:`linear-gradient(90deg,${col},${col}cc)`}}/>
                    </div>
                    <input type="range" min="0" max="100" step="5" value={pct}
                      onChange={e=>{const newPct=parseInt(e.target.value);const gs=JSON.parse(JSON.stringify(data.goals));gs[i]={...gs[i],completion:newPct};updateField('goals',gs);const milestones=[25,50,75,100];if(milestones.includes(newPct)&&newPct>pct&&onMilestone)onMilestone({title:g.title,pct:newPct});}}
                      className="w-full h-2 rounded-full appearance-none cursor-pointer" style={{accentColor:col}}/>
                    <div className="flex justify-between text-xs text-slate-500 mt-1">
                      <span>0%</span><span>50%</span><span>100%</span>
                    </div>
                  </div>
                );
              }).filter(Boolean)}
              {!data.goals.some(g=>g.title?.trim()) && (
                <p className="text-center text-slate-500 text-sm py-4">No goals set yet — add them in More → Vision & Goals</p>
              )}
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={()=>setRitualStep(2)} className="px-4 py-3 bg-slate-700 rounded-xl text-white text-sm">← Back</button>
              <button onClick={()=>setRitualStep(4)} className="flex-1 py-3 rounded-xl font-semibold text-white text-sm" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>Next →</button>
            </div>
          </div>
        )}

        {/* Step 4: Priorities */}
        {ritualStep===4 && (
          <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700 slide-up">
            <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wide mb-3">This Week's Priorities</h3>
            {[0,1,2,3].map(i=>(
              <div key={i} className="flex items-center gap-3 mb-2">
                <span className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{background:'rgba(59,130,246,0.2)',color:'#60a5fa'}}>{i+1}</span>
                <input value={week.goalPriorities[i]||''} onChange={e=>{const p=[...week.goalPriorities];p[i]=e.target.value;updateWeek('goalPriorities',p);}} placeholder={`Priority ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-blue-500 focus:outline-none"/>

                {isRitualComplete?'Week Planned ✓':'Complete Ritual'}
              </button>

        <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">

                  <button onClick={()=>{const a=JSON.parse(JSON.stringify(week.aActivities||[]));a.splice(ai,1);updateWeek('aActivities',a);}} className="flex-shrink-0 w-8 h-8 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 transition-all flex items-center justify-center text-lg">✕</button>
                </div>
                {act.name && (
                  <div className="flex justify-around">
                    {['M','T','W','T','F','S','S'].map((d,di)=>(

                        className={`w-9 h-9 rounded-full text-xs font-bold transition-all ${(act.days||[])[di]?'text-white scale-110':'bg-slate-700/50 text-slate-500'}`}
                        style={(act.days||[])[di]?{background:'linear-gradient(135deg,#f59e0b,#f97316)'}:{}}>
                        {d}

          <h3 className="text-sm font-bold text-red-400 uppercase tracking-wide mb-3">Messes to Clean Up</h3>
          {[0,1,2].map(mi=>{
            const mess=(week.messes||[])[mi]||{description:'',nextSteps:'',byWhen:'',completed:false};
            const upd=(f,v)=>{const m=JSON.parse(JSON.stringify(week.messes||[{},{},{}]));m[mi]={...m[mi],[f]:v};updateWeek('messes',m);};
            return(
              <div key={mi} className="mb-3 pb-3 border-b border-slate-700 last:border-0">
                <div className="flex gap-2 mb-2">
                  <input value={mess.description||''} onChange={e=>upd('description',e.target.value)} placeholder={`Mess ${mi+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-2 text-white placeholder-slate-500 text-sm focus:outline-none"/>

                </div>

                  <input type="date" value={mess.byWhen||''} onChange={e=>upd('byWhen',e.target.value)} className="bg-slate-700/50 border border-slate-600/50 rounded-lg p-2 text-white text-xs focus:outline-none"/>
