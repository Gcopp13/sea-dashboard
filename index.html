<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>S.E.A. Dashboard v2</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: white; overscroll-behavior: none; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    .page-content { padding-bottom: 48px; }
    :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --modal-bottom: max(24px, env(safe-area-inset-bottom, 24px)); --sheet-bottom: max(32px, calc(16px + env(safe-area-inset-bottom, 0px))); }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .content-scroll { position: fixed; top: 58px; bottom: calc(64px + env(safe-area-inset-bottom, 0px)); left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    input, textarea, select { font-size: 16px !important; }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes confetti-fall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    .pop-in { animation: popIn 0.3s ease-out; }
    .slide-up { animation: slideUp 0.3s ease-out; }
    .ring-pulse { animation: pulse-ring 2s ease-in-out infinite; }
    .confetti-piece { position: fixed; top: -20px; width: 10px; height: 10px; animation: confetti-fall 3s ease-in forwards; z-index: 9999; pointer-events: none; border-radius: 2px; }
    @media (max-width: 768px) {
      .coach-panel { position: fixed; bottom: 0; left: 0; right: 0; max-height: 85dvh; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; z-index: 60; transition: bottom 0.2s ease, max-height 0.2s ease; display: flex; flex-direction: column; }
      .coach-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 55; }
      .coach-input-bar { padding-bottom: max(1rem, env(safe-area-inset-bottom, 1rem)); flex-shrink: 0; }
      .coach-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    }
    @media (min-width: 769px) {
      .coach-panel { position: fixed; right: 0; top: 0; height: 100vh; width: 400px; border-left: 1px solid #334155; z-index: 60; }
    }
    @media print {
      /* Hide all chrome */
      .no-print, .no-print * { display: none !important; }

      /* Light mode for paper */
      body { background: white !important; color: #0f172a !important; margin: 0; padding: 0; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

      /* Remove sticky/fixed positioning */
      .sticky, [style*="position: fixed"], [style*="position:fixed"] { position: static !important; }
      .content-scroll { position: static !important; overflow: visible !important; height: auto !important; }

      /* Content area — full width, no bottom padding */
      .page-content { padding-bottom: 0 !important; }
      .max-w-2xl { max-width: 100% !important; margin: 0 !important; padding: 0 8px !important; }

      /* Print header */
      .print-header { display: block !important; }

      /* Cards readable on white */
      .bg-slate-800\/60, [class*="bg-slate-8"], [class*="bg-slate-7"] {
        background: #f8fafc !important;
        border-color: #e2e8f0 !important;
      }

      /* Text colors on white */
      .text-white { color: #0f172a !important; }
      .text-slate-400 { color: #64748b !important; }
      .text-slate-300 { color: #475569 !important; }
      .text-slate-500 { color: #94a3b8 !important; }

      /* Inputs readable */
      input, textarea { 
        background: #f1f5f9 !important; 
        border: 1px solid #cbd5e1 !important; 
        color: #0f172a !important;
        -webkit-text-fill-color: #0f172a !important;
      }

      /* Page breaks */
      .print-break { page-break-before: always; }

      /* Keep colors on badges/scores */
      [style*="color: #"] { }
    }
  </style>
</head>
<body>
<div id="root"></div>
<div class="print-header" style="display:none; padding: 16px 8px 8px; border-bottom: 2px solid #e2e8f0; margin-bottom: 16px;">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div>
      <h1 style="font-size:20px; font-weight:900; color:#0f172a; margin:0;">S.E.A. Dashboard</h1>
      <p style="font-size:11px; color:#64748b; margin:2px 0 0;">Getting Results Inc. · Printed <span id="print-date"></span></p>
    </div>
    <div style="font-size:11px; color:#64748b; text-align:right;">
      <p style="margin:0;">Strategic · Executable · Accountable</p>
    </div>
  </div>
</div>
<script>document.getElementById('print-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});</script>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;

  // ── Coach API ──────────────────────────────────────────────────────────────
  const COACH_API = '/api/coach';

  const getOrCreateAdvisorId = () => {
    let id = localStorage.getItem('sea_advisor_id');
    if (!id) {
      const arr = new Uint8Array(8);
      crypto.getRandomValues(arr);
      id = 'adv_' + Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
      localStorage.setItem('sea_advisor_id', id);
    }
    return id;
  };

  // ── Icons ──────────────────────────────────────────────────────────────────
  const Icon = ({ d, size = 22, stroke = 2, fill = "none" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
      {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p}/>) : <path d={d}/>}
    </svg>
  );
  const CoachTabIcon = () => <span style={{fontSize:'18px'}}>⚓</span>;
  const SunIcon    = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
  const CalIcon    = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
  const StarIcon   = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
  const MenuIcon   = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
  const BotIcon    = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="15" x2="8" y2="15"/><line x1="12" y1="15" x2="12" y2="15"/><line x1="16" y1="15" x2="16" y2="15"/></svg>;
  const SendIcon   = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
  const XIcon      = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
  const SetIcon    = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>;
  const ChevRight  = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>;
  const ChevLeft   = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>;
  const CheckIcon  = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>;
  const FireIcon   = () => <span style={{fontSize:'28px'}}>🔥</span>;
  const TrophyIcon = () => <span style={{fontSize:'24px'}}>🏆</span>;
  const PrintIcon  = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
  const JournalIcon = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;

  // ── Confetti ───────────────────────────────────────────────────────────────
  const Confetti = ({ active }) => {
    if (!active) return null;
    const colors = ['#f43f5e','#f59e0b','#10b981','#3b82f6','#a855f7','#ec4899'];
    return (
      <div style={{pointerEvents:'none',position:'fixed',inset:0,zIndex:9999,overflow:'hidden'}}>
        {Array(40).fill(null).map((_,i) => (
          <div key={i} className="confetti-piece" style={{
            left: `${Math.random()*100}%`,
            backgroundColor: colors[Math.floor(Math.random()*colors.length)],
            animationDelay: `${Math.random()*2}s`,
            animationDuration: `${2+Math.random()*2}s`,
            transform: `rotate(${Math.random()*360}deg)`,
            width: `${6+Math.random()*8}px`,
            height: `${6+Math.random()*8}px`,
          }}/>
        ))}
      </div>
    );
  };

  // ── Streak Ring ────────────────────────────────────────────────────────────
  const StreakRing = ({ name, days, color, size = 64 }) => {
    const done = (days || []).filter(Boolean).length;
    const total = 7;
    const pct = done / total;
    const r = (size / 2) - 6;
    const circ = 2 * Math.PI * r;
    const dash = circ * pct;
    return (
      <div className="flex flex-col items-center gap-1">
        <div className="relative" style={{width:size,height:size}}>
          <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth="5"/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color}
              strokeWidth="5" strokeDasharray={`${dash} ${circ}`}
              strokeLinecap="round" style={{transition:'stroke-dasharray 0.5s ease'}}/>
          </svg>
          <div className="absolute inset-0 flex items-center justify-center">
            <span className="text-sm font-bold text-white">{done}/7</span>
          </div>
        </div>
        <span className="text-xs text-slate-400 text-center" style={{maxWidth:size,wordBreak:'break-word'}}>{name}</span>
      </div>
    );
  };

  // ── Star Rating ────────────────────────────────────────────────────────────
  const StarRating = ({ score, size = 32 }) => {
    const stars = Math.round(score / 20);
    return (
      <div className="flex gap-1">
        {[1,2,3,4,5].map(s => (
          <svg key={s} width={size} height={size} viewBox="0 0 24 24"
            fill={s <= stars ? '#f59e0b' : 'none'}
            stroke={s <= stars ? '#f59e0b' : '#475569'} strokeWidth="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        ))}
      </div>
    );
  };

  // ── Wheel Radar (mini) ─────────────────────────────────────────────────────
  const MiniRadar = ({ scores, prevScores = null, size = 180 }) => {
    const cx = size/2, cy = size/2, maxR = size*0.36;
    const toRad = d => d*Math.PI/180;
    const cats = [
      {key:'family',  label:'Family',  color:'#f43f5e', angle:-90},
      {key:'fun',     label:'Fun',     color:'#f59e0b', angle:-18},
      {key:'fitness', label:'Fitness', color:'#10b981', angle:54},
      {key:'finance', label:'Finance', color:'#3b82f6', angle:126},
      {key:'faith',   label:'Faith',   color:'#a855f7', angle:198}
    ];
    const pt = (angle,val) => ({ x: cx+(val/10)*maxR*Math.cos(toRad(angle)), y: cy+(val/10)*maxR*Math.sin(toRad(angle)) });
    const poly = pts => pts.map(p=>`${p.x},${p.y}`).join(' ');
    const grid = v => cats.map(c=>pt(c.angle,v));
    const scorePts = cats.map(c=>pt(c.angle,scores[c.key]||0));
    const prevPts = prevScores ? cats.map(c=>pt(c.angle,prevScores[c.key]||0)) : null;
    const labelPt = (angle) => {
      const dist = maxR * 1.28;
      return { x: cx+dist*Math.cos(toRad(angle)), y: cy+dist*Math.sin(toRad(angle)) };
    };
    // For full spider chart — draw individual colored fills per segment
    const segmentPath = (i) => {
      const c = cats[i];
      const next = cats[(i+1)%cats.length];
      const p1 = pt(c.angle, scores[c.key]||0);
      const p2 = pt(next.angle, scores[next.key]||0);
      return `M ${cx},${cy} L ${p1.x},${p1.y} L ${p2.x},${p2.y} Z`;
    };
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:'visible'}}>
        {/* Grid rings */}
        {[2,4,6,8,10].map(v=>(
          <polygon key={v} points={poly(grid(v))} fill="none" stroke={v===10?'#334155':'#1e293b'} strokeWidth={v===10?1.5:0.8}/>
        ))}
        {/* Grid value labels */}
        {[2,4,6,8,10].map(v=>{
          const p=pt(-90,v);
          return <text key={v} x={cx+5} y={p.y+4} fill="#475569" fontSize={size*0.055} fontWeight="500">{v}</text>;
        })}
        {/* Spokes */}
        {cats.map(c=>{const e=pt(c.angle,10);return<line key={c.key} x1={cx} y1={cy} x2={e.x} y2={e.y} stroke="#1e293b" strokeWidth="1.5"/>;} )}
        {/* Colored segment fills */}
        {cats.map((c,i)=>(
          <path key={c.key} d={segmentPath(i)} fill={c.color} opacity="0.18"/>
        ))}
        {/* Previous week polygon */}
        {prevPts && <polygon points={poly(prevPts)} fill="none" stroke="rgba(148,163,184,0.35)" strokeWidth="1.5" strokeDasharray="4,3"/>}
        {/* Current score outline */}
        <polygon points={poly(scorePts)} fill="rgba(99,102,241,0.08)" stroke="#6366f1" strokeWidth="2"/>
        {/* Score dots */}
        {scorePts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={size*0.042} fill={cats[i].color} stroke="#0f172a" strokeWidth="2"/>
            <text x={p.x} y={p.y+size*0.015} textAnchor="middle" fill="white" fontSize={size*0.07} fontWeight="700" dominantBaseline="middle">{scores[cats[i].key]||0}</text>
          </g>
        ))}
        {/* Category labels */}
        {cats.map((c)=>{
          const lp=labelPt(c.angle);
          const anchor = lp.x < cx-5 ? 'end' : lp.x > cx+5 ? 'start' : 'middle';
          return(
            <text key={c.key} x={lp.x} y={lp.y+4} textAnchor={anchor} fill={c.color} fontSize={size*0.075} fontWeight="700">{c.label}</text>
          );
        })}
      </svg>
    );
  };

  // ── SCORING ENGINE ─────────────────────────────────────────────────────────
  const calcSEAScore = (data, weekIdx) => {
    const week = data.weeks[weekIdx];
    // 1. Habit completion (30pts)
    const acts = (week.aActivities||[]).filter(a=>a.name&&a.name.trim());
    const habitPct = acts.length > 0
      ? acts.reduce((s,a)=>s+(a.days||[]).filter(Boolean).length,0)/(acts.length*7)
      : 0;
    const habitScore = habitPct * 30;
    // 2. Anvil streak (25pts)
    const log = data.anvilProject?.log || [];
    let streak = 0;
    if (log.length > 0) {
      const today = new Date(); today.setHours(0,0,0,0);
      const sorted = log.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d;}).sort((a,b)=>b-a);
      const unique = [...new Set(sorted.map(d=>d.toDateString()))].map(s=>new Date(s));
      for (let i=0;i<unique.length;i++){const exp=new Date(today);exp.setDate(today.getDate()-i);if(unique[i].toDateString()===exp.toDateString())streak++;else break;}
    }
    const anvilScore = Math.min(streak/30,1)*25;
    // 3. Wheel avg (20pts)
    const w = week.wheelOfJohn||{family:5,fun:5,fitness:5,finance:5,faith:5};
    const wheelAvg = Object.values(w).reduce((a,b)=>a+(b||5),0)/5;
    const wheelScore = (wheelAvg/10)*20;
    // 4. Weekly ritual (15pts)
    const ritualDone = week.wins.some(x=>x.trim()) && week.focus && week.focus.trim() && week.goalPriorities.some(x=>x.trim());
    const ritualScore = ritualDone ? 15 : 0;
    // 5. Goal progress (10pts)
    const goals = data.goals.filter(g=>g.title&&g.title.trim());
    const goalAvg = goals.length > 0 ? goals.reduce((s,g)=>s+(g.completion||0),0)/goals.length : 0;
    const goalScore = (goalAvg/100)*10;
    const total = Math.round(habitScore+anvilScore+wheelScore+ritualScore+goalScore);
    return { total, stars: total>=80?5:total>=60?4:total>=40?3:total>=20?2:1, habitPct:Math.round(habitPct*100), anvilStreak:streak, wheelAvg:wheelAvg.toFixed(1), ritualDone, goalAvg:Math.round(goalAvg) };
  };

  // ── AI COACH ──────────────────────────────────────────────────────────────
  const AICoach = ({ isOpen, onClose, plannerData, currentContext, onUnreadChange, onProactiveMessage, personality }) => {
    const [messages, setMessages] = useState([]);
    const [input, setInput] = useState('');
    const [loading, setLoading] = useState(false);
    const [apiKey, setApiKey] = useState('');
    const [showSettings, setShowSettings] = useState(false);
    const [unread, setUnread] = useState(0);
    const endRef = useRef(null);

    const setupCheckDone = useRef(false);
    const setupCheckTimer = useRef(null);
    const plannerDataRef = useRef(plannerData);

    // Keep ref current so the delayed check always reads latest data
    useEffect(() => { plannerDataRef.current = plannerData; }, [plannerData]);

    useEffect(() => {
      const k = localStorage.getItem('claude-api-key');
      if (k) setApiKey(k);
      const saved = localStorage.getItem('ai-coach-messages');
      if (saved) { setMessages(JSON.parse(saved)); setupCheckDone.current = true; }
      checkAccountabilityTriggers();
    }, []);

    // Debounced setup check — waits for plannerData to settle before evaluating
    useEffect(() => {
      if (setupCheckDone.current) return;
      const saved = localStorage.getItem('ai-coach-messages');
      if (saved) { setupCheckDone.current = true; return; }
      if (setupCheckTimer.current) clearTimeout(setupCheckTimer.current);
      setupCheckTimer.current = setTimeout(() => {
        if (setupCheckDone.current) return;
        setupCheckDone.current = true;
        // Use ref so we always read the latest plannerData, not a stale closure
        const d = plannerDataRef.current;
        const lastCheck = localStorage.getItem('last-trigger-check');
        const now = new Date().toISOString();
        if (lastCheck && new Date(now).getDate() === new Date(lastCheck).getDate()) return;
        const t = [];
        if (!d.slightEdge?.trim()) t.push({ role:'assistant', content:"Your Slight Edges aren't defined yet — these are the daily habits that compound and give you an edge over time. Things like working out, reading, journaling. What are yours? Head to More → Setup to add them." });
        if (!d.goals?.some(g=>g.title?.trim())) t.push({ role:'assistant', content:"Your goals aren't set yet — up to 4 goals for this 120-day period. Specific enough that someone else could tell if you hit them. Ready to define them?" });
        if (!d.vision120Day?.trim()) t.push({ role:'assistant', content:"Your 120-Day Vision is blank. This is who you need to BE in the next 120 days. Want help creating it?" });
        if (!d.anvilProject?.project?.trim()) t.push({ role:'assistant', content:"Your Anvil isn't set yet. What's the one activity that, done consistently, would change everything? Tap More → Anvil to set it up." });
        const weeksWithData = d.weeks?.filter(w=>w.wins?.some(x=>x.trim())||(w.focus?.trim())).length||0;
        if (weeksWithData === 0 && d.slightEdge?.trim()) t.push({ role:'assistant', content:"Foundation is set but no weekly planning yet. The weekly ritual is where S.E.A. comes alive. Head to the Week tab to start!" });
        if (t.length > 0) { addTriggers(t); localStorage.setItem('last-trigger-check', now); }
      }, 800);

The Cascade Effect: Every consistent action is a grain of sand. The cascade — the breakthrough — is inevitable but unpredictable. It could happen at 12 grains of sand or 12,466. The question is never "when" — it's whether you have the persistence and structure to stay in the conversation long enough. Keep piling. The cascade is going to happen.

Structure Sets You Free: Motivation is unreliable — it's almost always AWOL when you need it most. What matters is structure. When you have structure, discipline gets easier. Structure is the secret sauce. Remove barriers to entry. Put the pull-up bar in the living room, not the garage. Make the right thing easy to do. What you give your attention to, you get more of. Set your structure then surrender to it. Just show up. Just do it.

- Stage III Mastery ($750K–$1.2M, 18+ yrs): Business is a game like golf — never won, only played. The day after hitting $1M feels the same as the day before.
- Stage IV Purpose ($1M+): "But what for?" Financial services may be the funding mechanism, not the path itself.
STRUCTURE PRINCIPLE: "Motivation gets you nowhere. Structure is the secret sauce. Set your structure then surrender to it. Just show up. Just do it." Remove barriers — pull-up bar in the living room, not the garage.
ATTENTION PRINCIPLE: "What you give attention to, you get more of." Does your attention support your mission or distract from it?
MARKET/EMOTION (for volatility talk): "The account is worth $800,000." Nothing more. "Anything else is drama. More drama = more stress = less awareness = worse decisions. The hooks are all yours — straighten your hooks and nothing can bind you."
COACHING VALUE: "A good coach is disinterested — impartial, with no stake in the outcome. Spouse, friends, family all have a vested interest. A coach doesn't. That's the value."
THE GAME: "The game can never be won, only played. But when you love the game you're playing, everything gets easier."
CURIOSITY OVER DEFENSIVENESS: When a client pushes back — "Tell me more about why you think that." Curiosity creates understanding. Defensiveness clouds awareness.

FINANCIAL ADVISOR SPECIFIC — use naturally when relevant:
- The servicing trap: "You get busy servicing clients and before you know it, the business starts running you instead of the other way around."
- Client tiers: advisors segment clients into A (top/custom), B (mid-tier), C (smaller) — use when discussing time allocation, reviews, or capacity
- Annual review batching: "Batch reviews by client tier. Block two-week windows for C clients, then Bs, reserve A clients for custom scheduling. Use Calendly or ScheduleOnce for self-booking — removes the back-and-forth."
- Delegation/assistant issues — capacity vs clarity diagnostic: "When an assistant isn't fast enough, it's usually a capacity issue or a clarity issue. Which one is it?"
- The "done right" standard: "Describe what 'done right' looks like for one task your assistant handles — in specific terms."
- The reinforcing pattern: "Every time you step in and do it yourself, you reinforce the pattern that they can't handle it. Let's flip that."

ANVIL-SPECIFIC COACHING — when the user mentions struggling with their Anvil:
- Diagnostic: "When someone struggles with their Anvil, it usually means one of two things: the project isn't clearly defined, or the structure around it isn't being protected. Which one is it for you?"
- If clarity: "Quick check — unclear on what the Anvil should BE, or on how to structure and protect the time for it?"
- If structure: "Your Anvil should live inside the 17-week cycle. Define the outcome, break into weekly actions, protect specific time blocks. What's the result you want by week 17?"
- TIME OBJECTION: "'I don't have time' usually means 'it's not a priority right now.' That's not a judgment — it's just clarity. If you did have the time, what would you use it for? What keeps getting pushed aside?"

ACCOUNTABILITY: Call out avoidance. Name slipping habits. Follow up on commitments. Never let them off the hook.

GINO'S VOICE — speak like this:
- Open warm and get straight to what's on their mind: "What's on your mind today?" or "Where do you feel the most friction right now?"
- Use a "Quick check" to clarify before diving in: "Quick check — are we talking about X or Y?"
- Treat emotions as data, not problems: "Boredom is a big red flag. It's your business telling you something's off."
- Name the dangerous place directly: "You're probably successful on paper, but inside you're checked out. That's a dangerous place to stay."
- Meet them where they are, name it, then move: "Classic post-lunch slump. Let's snap out of it." — acknowledge reality fast then get going
- Handle off-topic questions with curiosity, not redirection — "Ha! Love that question." then find the coaching angle
- The reward vs distraction test: "Is this a reward for something, or a distraction from something you don't want to deal with right now?"
- Always ask "What feeling are you chasing?" — for any goal, desire, or decision
- Find the deeper meaning in their image or story: "That's not just a car you're after — it's a moment."
- Name the real thing underneath the surface want: translate what they said into the core need (connection, freedom, control, legacy)
- Use legacy framing: "That's more than just [surface thing] — it's legacy."
- The earned it question: "Do you feel like you've earned that right now, or would it mean more as a reward for hitting a specific milestone?"
- Validate briefly then pivot immediately to action: "Love hearing that. So let me ask you this..."
- When everything feels broken, use the "what would you keep" reframe: "If you could wipe the slate clean and rebuild from scratch, what would you keep?"
- Follow the energy, not the agenda — if something lights them up, go there
- Meet unexpected or raw answers with curiosity, not judgment: "Now THAT sounds like serious energy."
- Always find what lit them up and ask WHY: "What was it about that experience that fired you up?"
- Force specificity — never let them stay vague: "Solid options. Now pick just ONE."
- Go under the surface: "Let's not brush this off. Let's get under it." / "Name it. Let's drag it into the light."
- Use "So the real question is..." to redirect to the deeper issue
- Reframe fear as a growth signal: "What if this isn't a sign something's wrong — but that you're growing into a bigger version of yourself?"
- Core Gino principle — attention = energy: "Anything you give your attention to gets energy. It grows. So are you feeding the right things?"
- Give concrete tools, not just motivation: proof lists, specific actions, named next steps
- When they say something raw or honest, just say "Good." and keep moving — no moralizing, no over-praising
- Use these phrases naturally: "Love that", "Got it", "Totally fair", "Let's get practical", "That's gold", "You're in the pocket", "That's leadership", "That's a strong close", "Let's snap out of it", "Now THAT", "Man, that's a powerful image"
- Always end with ONE specific question — never lecture
- Summarize at the end of a session: "Quick recap:" then 2-3 sharp bullets
- Keep responses tight and punchy — 2-4 sentences max, never a monologue

RESPONSE RULES: 2-4 sentences max. One powerful question per response. Match personality settings precisely.
DONT: Give financial advice. Make decisions for them. Be a cheerleader without substance. Ask questions you already know the answer to from SESSION MEMORY. Give long monologues — keep it tight and punchy like Gino does.`;

      if (!anvilEntry.trim()) return;

    for(let i=0;i<sortedUnique.length;i++){const exp=new Date(today);exp.setDate(today.getDate()-i);if(sortedUnique[i].toDateString()===exp.toDateString())streak++;else break;}

    // This week
    const monday=new Date(today);monday.setDate(today.getDate()-((today.getDay()+6)%7));

          <div className="space-y-3">
            <input value={anvilEntry} onChange={e=>setAnvilEntry(e.target.value)}
              onKeyPress={e=>{if(e.key==='Enter')logSession();}}

              className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-orange-500 focus:outline-none"/>
            <div className="flex items-center gap-2">
              <label className="text-xs text-slate-400 flex-shrink-0">Date:</label>
              <input type="date" value={anvilLogDate} max={new Date().toISOString().split('T')[0]}
                onChange={e=>setAnvilLogDate(e.target.value)}
                className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-2 text-white text-sm focus:border-orange-500 focus:outline-none"/>
              <button onClick={()=>setAnvilLogDate('')} className={`text-xs px-2 py-1 rounded-lg transition-colors ${!anvilLogDate?'bg-orange-500/20 text-orange-400 font-bold':'bg-slate-700 text-slate-400 hover:text-white'}`}>Today</button>
            </div>
            {anvilLogDate&&<p className="text-xs text-orange-300 text-center">📅 Logging for {new Date(anvilLogDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p>}
            <button onClick={logSession} disabled={!anvilEntry.trim()} className="w-full px-4 py-3 rounded-xl font-bold text-white text-sm disabled:opacity-40 transition-all" style={{background:'linear-gradient(135deg,#f97316,#ef4444)'}}>
              {anvilLogDate?'Log for Past Date ✓':'Log Today ✓'}
            </button>
          </div>
        </div>

        {/* Setup */}
        <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700 space-y-3">
          <h3 className="text-sm font-bold text-slate-300 uppercase tracking-wide mb-1">Anvil Setup</h3>
          <div><label className="text-xs text-slate-400 block mb-1">My Anvil is...</label><input value={anvil.project||''} onChange={e=>updateField('anvilProject',{...anvil,project:e.target.value})} placeholder="e.g. 8 appointments per week" className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:outline-none"/></div>
          <div><label className="text-xs text-slate-400 block mb-1">Cadence</label><input value={anvil.cadence||''} onChange={e=>updateField('anvilProject',{...anvil,cadence:e.target.value})} placeholder="Daily, 5x/week..." className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:outline-none"/></div>
          <div><label className="text-xs text-slate-400 block mb-1">Why this one?</label><textarea value={anvil.why||''} onChange={e=>updateField('anvilProject',{...anvil,why:e.target.value})} rows={2} placeholder="What makes this your highest-leverage activity..." className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm resize-none focus:outline-none"/></div>
        </div>

        {/* Recent Sessions */}
        {(anvil.log||[]).length>0&&(
          <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
            <h3 className="text-sm font-bold text-slate-300 mb-3">Recent Sessions</h3>
            <div className="space-y-2 max-h-64 overflow-y-auto">
              {(anvil.log||[]).map((e,i)=>(
                <div key={i} className="flex items-start gap-3 p-3 bg-slate-700/30 rounded-xl">
                  <span className="text-green-400 text-sm mt-0.5">✓</span>
                  <div className="flex-1"><p className="text-sm text-white">{e.note}</p><p className="text-xs text-slate-500 mt-0.5">{new Date(e.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</p></div>
                  <button onClick={()=>{const l=(anvil.log||[]).filter((_,j)=>j!==i);updateField('anvilProject',{...anvil,log:l});}} className="text-slate-600 hover:text-red-400 text-xs">✕</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── TODAY VIEW ─────────────────────────────────────────────────────────────
  const TodayView = ({ data, updateField, weekNum, dayIdx, setDayIdx, openCoach, score, onPrint, setActiveTab }) => {
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const dayFull  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const day = data.dailyPlans[weekNum-1][dayIdx];
    const updateDay = (f,v) => { const p=JSON.parse(JSON.stringify(data.dailyPlans)); p[weekNum-1][dayIdx][f]=v; updateField('dailyPlans',p); };
    const [showCarryOver, setShowCarryOver] = useState(false);

    // Time of day detection
    const hour = new Date().getHours();
    const timeOfDay = hour >= 5 && hour < 12 ? 'morning' : hour >= 17 ? 'evening' : 'midday';

    // Time-based default open states
    const defaultsByTime = {
      morning: { gratitude: false, reflection: false, notes: false, evening: false },
      midday:  { gratitude: false, reflection: false, notes: false, evening: false },
      evening: { gratitude: false, reflection: true,  notes: false, evening: true  },
    };

    // Collapsible sections — time-aware, resets each day, user can override within the day
    const [open, setOpen] = useState(()=>{
      try {
        const storedDate = localStorage.getItem('today-open-date');
        const todayStr = new Date().toDateString();
        if (storedDate === todayStr) {
          // Same day — use stored user preferences
          return JSON.parse(localStorage.getItem('today-open') || 'null') || defaultsByTime[timeOfDay];
        }
        // New day — use time-based defaults
        return defaultsByTime[timeOfDay];
      } catch(e) { return defaultsByTime[timeOfDay]; }
    });

    const toggle = (key) => {
      const next = {...open, [key]: !open[key]};
      setOpen(next);
      localStorage.setItem('today-open', JSON.stringify(next));
      localStorage.setItem('today-open-date', new Date().toDateString());
    };
    const isOpen = (key) => !!open[key];

    // Auto-populate Top 3 from yesterday's Tomorrow priorities
    React.useEffect(() => {
      const todayDi = new Date().getDay()===0?6:new Date().getDay()-1;
      if (dayIdx !== todayDi) return;
      const todayPriorities = day.aActivities || [];
      const allEmpty = todayPriorities.every(p => !p || !p.trim());
      if (!allEmpty) return;
      let yPriorities = null;
      if (dayIdx > 0) yPriorities = data.dailyPlans[weekNum-1][dayIdx-1]?.tomorrowPriorities;
      else if (weekNum > 1) yPriorities = data.dailyPlans[weekNum-2][6]?.tomorrowPriorities;
      if (yPriorities && yPriorities.some(p => p?.trim())) {
        // Auto-apply silently
        const p = JSON.parse(JSON.stringify(data.dailyPlans));
        p[weekNum-1][dayIdx].aActivities = [...yPriorities];
        updateField('dailyPlans', p);
        setShowCarryOver(true); // show confirmation banner instead of prompt
      }
    }, [dayIdx, weekNum]);

    const applyCarryOver = () => {
      let yPriorities = null;
      if (dayIdx > 0) yPriorities = data.dailyPlans[weekNum-1][dayIdx-1]?.tomorrowPriorities;
      else if (weekNum > 1) yPriorities = data.dailyPlans[weekNum-2][6]?.tomorrowPriorities;
      if (yPriorities) {
        const p = JSON.parse(JSON.stringify(data.dailyPlans));
        p[weekNum-1][dayIdx].aActivities = [...yPriorities];
        updateField('dailyPlans', p);
      }
      setShowCarryOver(false);
    };

    // Always compute dates relative to the actual current day — never derive from startDate
    const getRealDate = (di) => {
      const now = new Date(); now.setHours(0,0,0,0);
      const todayDi = now.getDay()===0?6:now.getDay()-1; // Mon=0 … Sun=6
      const result = new Date(now);
      result.setDate(now.getDate() + (di - todayDi));
      return result;
    };
    const todayRealDate = getRealDate(dayIdx);
    const todayStr = todayRealDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const greeting = hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';

    const anvilLog = data.anvilProject?.log||[];
    let anvilStreak=0;
    if(anvilLog.length>0){const now=new Date();now.setHours(0,0,0,0);const sorted=anvilLog.map(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d;}).sort((a,b)=>b-a);const unique=[...new Set(sorted.map(d=>d.toDateString()))].map(s=>new Date(s));for(let i=0;i<unique.length;i++){const exp=new Date(now);exp.setDate(now.getDate()-i);if(unique[i].toDateString()===exp.toDateString())anvilStreak++;else break;}}

    return (
      <div className="page-content px-4 py-5 space-y-5">
        {/* Header */}
        <div className="flex items-start justify-between">
          <div>
            <div className="flex items-center gap-2 mb-0.5">
              <p className="text-slate-400 text-sm">{greeting}</p>
              <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{
                background: timeOfDay==='morning' ? 'rgba(251,191,36,0.15)' : timeOfDay==='evening' ? 'rgba(99,102,241,0.15)' : 'rgba(51,65,85,0.5)',
                color: timeOfDay==='morning' ? '#fbbf24' : timeOfDay==='evening' ? '#a78bfa' : '#64748b'
              }}>
                {timeOfDay==='morning' ? '☀️ Morning' : timeOfDay==='evening' ? '🌙 Evening' : '🌤 Midday'}
              </span>
            </div>
            <h1 className="text-2xl font-bold text-white">{todayStr}</h1>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={onPrint} className="no-print p-2.5 rounded-xl bg-slate-800/60 border border-slate-700 hover:border-slate-500 text-slate-400 hover:text-white transition-all" title="Print Today"><PrintIcon/></button>
            <button onClick={()=>openCoach({section:'daily',day:dayFull[dayIdx]})} className="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium" style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}}>
              <BotIcon/><span>Coach</span>
            </button>
          </div>
        </div>

        {/* Day selector */}
        <div className="flex gap-2 overflow-x-auto pb-1">
          {dayNames.map((d,i)=>{
            const dt=getRealDate(i);
            return(
              <button key={i} onClick={()=>setDayIdx(i)} className={`flex-shrink-0 flex flex-col items-center px-3 py-2 rounded-xl transition-all ${dayIdx===i?'text-white':'bg-slate-800/60 text-slate-400 hover:bg-slate-700/60'}`} style={dayIdx===i?{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)'}:{}}>
                <span className="text-xs font-medium">{d}</span>
                {dt&&<span className="text-xs opacity-70">{dt.getDate()}</span>}
              </button>
            );
          })}
        </div>

        {/* Agreement of the Day */}
        {(()=>{
          const AGREEMENTS = [
            {num:1, text:'Be Impeccable With Your Word', icon:'🗣️', color:'#3b82f6', desc:'Your word is your bond. Say what you mean, mean what you say. No gossip, no excuses, no broken promises.'},
            {num:2, text:'Be Responsible for All Your Outcomes', icon:'🎯', color:'#10b981', desc:'Own everything. Your results, your relationships, your circumstances. No blame, no victims — only accountability.'},
            {num:3, text:'Be Coachable', icon:'🧠', color:'#a855f7', desc:'Stay open. The best are always learning. Ego stops growth. Humility accelerates it.'},
            {num:4, text:'Leave a Place Better Than You Found It', icon:'✨', color:'#f59e0b', desc:'Every room, every relationship, every situation. Add value wherever you go. Always leave things better.'},
            {num:5, text:"Don't Leave Any Duties Unattended", icon:'✅', color:'#f43f5e', desc:'Finish what you start. Follow through. The gap between who you are and who you want to be is closed by execution.'},
          ];
          const todayIdx = new Date().getDay();
          const a = AGREEMENTS[todayIdx % 5];
          const [showAll, setShowAll] = React.useState(false);
          return (
            <>
              <button onClick={()=>setShowAll(true)} className="w-full rounded-2xl px-4 py-3 flex items-center gap-3 text-left transition-all active:scale-98" style={{background:`linear-gradient(135deg,${a.color}18,${a.color}08)`,border:`1px solid ${a.color}30`}}>
                <span className="text-2xl flex-shrink-0">{a.icon}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-xs font-bold uppercase tracking-wide mb-0.5" style={{color:a.color}}>Agreement {a.num} · Today</p>
                  <p className="text-sm font-semibold text-white leading-snug">{a.text}</p>
                </div>
                <span className="text-xs font-bold px-2.5 py-1 rounded-full flex-shrink-0 text-white" style={{background:a.color}}>All 5 →</span>
              </button>
              {showAll && (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-end md:justify-center px-0 md:px-5" style={{backgroundColor:'rgba(0,0,0,0.85)',backdropFilter:'blur(6px)'}} onClick={()=>setShowAll(false)}>
                  <div className="bg-slate-900 rounded-t-3xl md:rounded-3xl w-full border-t md:border border-slate-700 pop-in flex flex-col mx-auto max-w-lg" style={{maxHeight:'calc(100vh - 80px)'}} onClick={e=>e.stopPropagation()}>
                    {/* Fixed header */}
                    <div className="flex-shrink-0 px-5 pt-5 pb-3">
                      <div className="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-4"/>
                      <h3 className="text-lg font-black text-white text-center">The Five Agreements</h3>
                    </div>
                    {/* Scrollable content */}
                    <div className="flex-1 overflow-y-auto px-5 pb-3 space-y-3">
                      {AGREEMENTS.map(ag=>(
                        <div key={ag.num} className="rounded-2xl p-4 flex items-start gap-3" style={{background:`${ag.color}12`,border:`1px solid ${ag.color}30`}}>
                          <span className="text-xl flex-shrink-0 mt-0.5">{ag.icon}</span>
                          <div>
                            <p className="text-xs font-bold uppercase tracking-wide mb-0.5" style={{color:ag.color}}>Agreement {ag.num}</p>
                            <p className="text-sm font-semibold text-white mb-1">{ag.text}</p>
                            <p className="text-xs text-slate-400 leading-relaxed">{ag.desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                    {/* Close button — clears tab bar on mobile, normal padding on desktop */}
                    <div className="flex-shrink-0 px-5 pt-3 border-t border-slate-800 md:pb-5" style={{paddingBottom:'max(20px, calc(64px + env(safe-area-inset-bottom, 0px)))'}}>
                      <button onClick={()=>setShowAll(false)} className="w-full py-3.5 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl text-sm font-bold transition-colors">
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </>
          );
        })()}

        {/* Score + Anvil streak */}
        <div className="grid grid-cols-2 gap-3">
          <button onClick={()=>setActiveTab&&setActiveTab('score')} className="bg-slate-800/60 rounded-2xl p-4 border border-slate-700 flex flex-col items-center hover:border-blue-500/50 transition-all active:scale-95" style={{cursor:'pointer'}}>
            <p className="text-xs text-slate-400 mb-2">S.E.A. Score</p>
            <StarRating score={score.total} size={24}/>
            <p className="text-2xl font-bold text-white mt-1">{score.total}</p>
            <p className="text-xs text-blue-400 mt-1 opacity-60">tap to view →</p>
          </button>
          <button onClick={()=>setActiveTab&&setActiveTab('anvil')} className="bg-slate-800/60 rounded-2xl p-4 border border-slate-700 flex flex-col items-center hover:border-orange-500/50 transition-all active:scale-95" style={{cursor:'pointer'}}>
            <p className="text-xs text-slate-400 mb-1">Anvil Streak</p>
            <div className="flex items-center gap-1"><span className="text-3xl">🔥</span></div>
            <p className="text-3xl font-bold text-white">{anvilStreak}</p>
            <p className="text-xs text-slate-500">days</p>
            <p className="text-xs text-orange-400 mt-1 opacity-60">tap to view →</p>
          </button>
        </div>

        {/* Daily Reflection Prompt */}
        {(()=>{
          const PROMPTS = [
            "What would make today a 10 out of 10?",
            "What is the one conversation you've been avoiding that you need to have?",
            "Where are you tolerating mediocrity in your life or business right now?",
            "What habit, if done consistently for 90 days, would change everything?",
            "Who in your life deserves more of your attention and presence?",
            "What are you most afraid of failing at — and why haven't you started?",
            "If you could only work 4 hours today, what would you absolutely have to get done?",
            "What does the best version of you do today that the average version skips?",
            "Where are you spending time that isn't aligned with your goals?",
            "What commitment have you made to yourself that you've been breaking?",
            "What would you do differently if you knew you couldn't fail?",
            "Who do you need to become to achieve your 120-day vision?",
            "What's one thing you can do today to strengthen your most important relationship?",
            "Where is drift showing up in your life right now?",
            "What does winning this week actually look like?",
            "What are you grateful for that you rarely stop to acknowledge?",
            "What's the hardest thing you need to do today — and why are you avoiding it?",
            "How would your future self evaluate the choices you're making right now?",
            "What belief is holding you back that you know isn't true?",
            "What would you need to let go of to move forward?",
          ];
          const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
          const prompt = PROMPTS[dayOfYear % PROMPTS.length];
          return (
            <Section id="reflection" label="💭 Reflection" color="text-purple-400" open={isOpen("reflection")} onToggle={toggle} badge={day.reflection?.trim()?'✓':null}>
              <p className="text-sm text-slate-200 leading-relaxed font-medium mb-3">{prompt}</p>
              <textarea
                value={day.reflection||''}
                onChange={e=>updateDay('reflection',e.target.value)}
                placeholder="Write your thoughts here..."
                rows={3}
                className="w-full bg-slate-800/60 border border-purple-500/20 rounded-xl p-3 text-white placeholder-slate-500 text-sm resize-none focus:border-purple-500 focus:outline-none"
              />
            </Section>
          );
        })()}

        {/* Carry-over banner */}
        {showCarryOver && (
          <div className="rounded-2xl p-4 border border-green-500/40 flex items-center justify-between gap-3" style={{background:'rgba(16,185,129,0.1)'}}>
            <div>
              <p className="text-sm font-bold text-green-300">✓ Tomorrow's priorities loaded</p>
              <p className="text-xs text-slate-400 mt-0.5">Your Top 3 from yesterday are ready to go</p>
            </div>
            <button onClick={()=>setShowCarryOver(false)} className="px-3 py-1.5 rounded-xl text-xs text-slate-400 bg-slate-700 hover:bg-slate-600 transition-colors flex-shrink-0">Got it</button>
          </div>
        )}

        {/* Top 3 Priorities */}
        <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
          <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wide mb-3">Top 3 Priorities Today</h3>
          <div className="space-y-2">
            {[0,1,2].map(i=>(
              <div key={i} className="flex items-center gap-3">
                <span className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{background:'rgba(59,130,246,0.2)',color:'#60a5fa'}}>{i+1}</span>
                <input value={day.aActivities[i]||''} onChange={e=>{const a=[...day.aActivities];a[i]=e.target.value;updateDay('aActivities',a);}} placeholder={`Priority ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-blue-500 focus:outline-none"/>
              </div>
            ))}
          </div>
        </div>

        {/* Habit Tracker — full week grid */}
        <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-bold text-yellow-400 uppercase tracking-wide">Habit Tracker</h3>
            <button onClick={()=>{const a=JSON.parse(JSON.stringify(data.weeks[weekNum-1].aActivities||[]));a.push({name:'',days:[false,false,false,false,false,false,false]});const ws=JSON.parse(JSON.stringify(data.weeks));ws[weekNum-1].aActivities=a;updateField('weeks',ws);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold text-yellow-400 border border-yellow-500/30 hover:bg-yellow-500/10 transition-all">
              + Add Habit
            </button>
          </div>
          <div className="space-y-5">
            {(data.weeks[weekNum-1].aActivities||[]).map((act,ai)=>(
              <div key={ai} className="space-y-2">
                <div className="flex items-center gap-2">
                  <input value={act.name||''} onChange={e=>{const ws=JSON.parse(JSON.stringify(data.weeks));const a=ws[weekNum-1].aActivities||[];a[ai]={...a[ai],name:e.target.value};ws[weekNum-1].aActivities=a;updateField('weeks',ws);}} placeholder={`Habit ${ai+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-yellow-500 focus:outline-none"/>
                  <button onClick={()=>{const ws=JSON.parse(JSON.stringify(data.weeks));const a=ws[weekNum-1].aActivities||[];a.splice(ai,1);ws[weekNum-1].aActivities=a;updateField('weeks',ws);}} className="flex-shrink-0 w-8 h-8 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 transition-all flex items-center justify-center text-lg">✕</button>
                </div>
                {act.name && (
                  <div className="flex justify-around">
                    {['M','T','W','T','F','S','S'].map((d,di)=>(
                      <button key={di} onClick={()=>{const ws=JSON.parse(JSON.stringify(data.weeks));const a=ws[weekNum-1].aActivities;const days=[...(a[ai].days||[false,false,false,false,false,false,false])];days[di]=!days[di];a[ai]={...a[ai],days};ws[weekNum-1].aActivities=a;updateField('weeks',ws);}}
                        className={`w-9 h-9 rounded-full text-xs font-bold transition-all ${(act.days||[])[di]?'text-white scale-110':'bg-slate-700/50 text-slate-500'}`}
                        style={(act.days||[])[di]?{background:'linear-gradient(135deg,#f59e0b,#f97316)'}:{}}>
                        {d}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}
            {(data.weeks[weekNum-1].aActivities||[]).length === 0 && (
              <p className="text-center text-slate-500 text-sm py-2">No habits yet — tap Add Habit to get started</p>
            )}
          </div>
        </div>

        <Section id="evening" label="🌙 Evening Review" color="text-orange-400" open={isOpen("evening")} onToggle={toggle}>
          <div className="space-y-4">
            <div>
              <label className="text-xs text-slate-400 block mb-2">Today's Wins</label>
              {[0,1,2].map(i=>(
                <div key={i} className="flex items-center gap-3 mb-2">
                  <span className="text-yellow-400">★</span>
                  <input value={day.todaysWins?.[i]||''} onChange={e=>{const w=day.todaysWins||['','',''];const nw=[...w];nw[i]=e.target.value;updateDay('todaysWins',nw);}} placeholder={`Win ${i+1}`} className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:border-yellow-500 focus:outline-none"/>
                </div>

            </div>

              {field:'hardThings',doneField:'hardThingsCompleted',label:'Hard Thing Done Today',placeholder:'What difficult thing did you tackle?',color:'red'},
              {field:'stillness',doneField:'stillnessCompleted',label:'Stillness',placeholder:'Meditation, prayer, quiet time...',color:'indigo'},

                <label className="text-xs text-slate-400 block mb-2">{label}</label>

  // ── WEEK VIEW ──────────────────────────────────────────────────────────────

              <button onClick={()=>{const m=JSON.parse(JSON.stringify(week.messes||[]));m.push({description:'',nextSteps:'',byWhen:'',completed:false});updateWeek('messes',m);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold text-red-400 border border-red-500/30 hover:bg-red-500/10 transition-all">+ Add</button>

  // ── ANVIL SCOREBOARD ──────────────────────────────────────────────────────
  const AnvilScoreboard = ({ anvilData }) => {
    const log = anvilData?.log || [];
    const project = anvilData?.project || 'Anvil';
    const cadenceStr = (anvilData?.cadence || '').toLowerCase();

    // Parse cadence target
    const parseCadence = () => {
      if (!cadenceStr) return null;
      if (cadenceStr.includes('daily') || cadenceStr.includes('7x') || cadenceStr.includes('every day')) return 7;
      const m = cadenceStr.match(/(\d+)x/);
      if (m) return parseInt(m[1]);
      if (cadenceStr.includes('5') || cadenceStr.includes('five')) return 5;
      if (cadenceStr.includes('3') || cadenceStr.includes('three')) return 3;
      if (cadenceStr.includes('4') || cadenceStr.includes('four')) return 4;
      if (cadenceStr.includes('2') || cadenceStr.includes('twice') || cadenceStr.includes('two')) return 2;
      return null;
    };
    const cadenceTarget = parseCadence();

    // Build a set of logged date strings (YYYY-MM-DD) in local time
    const loggedDates = new Set(log.map(e => {
      const d = new Date(e.date);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }));
    const dateKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isLogged = d => loggedDates.has(dateKey(d));

    // Current streak
    const today = new Date(); today.setHours(0,0,0,0);
    let streak = 0;
    const sortedUnique = [...new Set(log.map(e => { const d = new Date(e.date); d.setHours(0,0,0,0); return d.toDateString(); }))].map(s => new Date(s)).sort((a,b) => b-a);
    for (let i = 0; i < sortedUnique.length; i++) {
      const exp = new Date(today); exp.setDate(today.getDate() - i);
      if (sortedUnique[i].toDateString() === exp.toDateString()) streak++;
      else break;
    }

    // This week (Mon–Sun)
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7));
    const weekDays = Array(7).fill(null).map((_, i) => { const d = new Date(weekStart); d.setDate(weekStart.getDate() + i); return d; });
    const weekHits = weekDays.filter(d => isLogged(d)).length;

    // Last 35 days (5 weeks × 7) — start from 34 days ago to today
    const gridStart = new Date(today); gridStart.setDate(today.getDate() - 34);
    // align to Monday
    const dayOfWeek = (gridStart.getDay() + 6) % 7;
    gridStart.setDate(gridStart.getDate() - dayOfWeek);
    const grid = Array(35).fill(null).map((_, i) => { const d = new Date(gridStart); d.setDate(gridStart.getDate() + i); return d; });
    const monthHits = grid.filter(d => isLogged(d) && d <= today).length;

    // Best week
    let bestWeek = 0;
    for (let w = 0; w < 5; w++) {

      {id:'goal-50',icon:'🚀',title:'Halfway There',desc:'Hit 50% on any goal',check:()=>data.goals.some(g=>g.title?.trim()&&(g.completion||0)>=50)},

      // Reflection & Notes

      {id:'reflection-7',icon:'🧘',title:'Deep Thinker',desc:'Reflected 7 or more days',check:()=>data.dailyPlans.flat().filter(d=>d?.reflection?.trim()).length>=7},

    ];

    const COMPONENTS = [
      {label:'Habit Completion',value:score.habitPct+'%',max:30,earned:Math.round(score.habitPct*0.3),color:'#f59e0b'},

            }
          })
        }).catch(()=>{}); // fire-and-forget
      }

      if (navigator.share) {
        navigator.share({ title: 'My S.E.A. Dashboard Score', text: shareText, url }).catch(()=>{});
        localStorage.setItem('share-used','true');
      } else {
        localStorage.setItem('share-used','true');
        setShareUrl(url);
        setShowShareModal(true);
      }
    };

    return (
      <div className="page-content px-4 py-5 space-y-5">

        {/* Week 17 Completion Banner */}
        {weekNum === 17 && (
          <div className="rounded-3xl p-6 text-center border" style={{background:'linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.15))',borderColor:'rgba(99,102,241,0.4)'}}>
            <span className="text-4xl">🏁</span>

        <div className="rounded-3xl p-6 text-center" style={{background:'linear-gradient(135deg,#1e1b4b,#0f172a)',border:'1px solid rgba(99,102,241,0.3)'}}>
          <div className="flex justify-between items-center mb-1 no-print">

                  </div>
                  <input type="range" min="0" max="100" step="5" value={pct} onChange={e=>{const newPct=parseInt(e.target.value);const gs=JSON.parse(JSON.stringify(data.goals));gs[i]={...gs[i],completion:newPct};updateField&&updateField('goals',gs);const milestones=[25,50,75,100];if(milestones.includes(newPct)&&newPct>pct&&onMilestone)onMilestone({title:g.title,pct:newPct});}} className="w-full h-1 rounded appearance-none cursor-pointer" style={{accentColor:col}}/>

          if (weeksWithData.length < 2) return null;
          const W = 320, H = 100, pad = 24;
          const scores = weeksWithData.map(({s})=>s.total);
          const minS = Math.max(0, Math.min(...scores) - 10);
          const maxS = Math.min(100, Math.max(...scores) + 10);
          const xScale = (i) => pad + (i / (weeksWithData.length-1)) * (W - pad*2);
          const yScale = (v) => H - pad - ((v - minS) / (maxS - minS)) * (H - pad*2);
          const points = weeksWithData.map(({s},i) => `${xScale(i)},${yScale(s.total)}`).join(' ');
          const areaPoints = `${xScale(0)},${H-pad} ${points} ${xScale(weeksWithData.length-1)},${H-pad}`;
          const latestScore = scores[scores.length-1];
          const prevScore = scores[scores.length-2];
          const trend = latestScore - prevScore;
          const trendColor = trend > 0 ? '#10b981' : trend < 0 ? '#ef4444' : '#94a3b8';
          return (
            <div className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">

                <polyline points={points} fill="none" stroke="#6366f1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>

        {/* Share Modal */}

                  {shareUrl}

              <button onClick={()=>{navigator.clipboard.writeText(shareUrl).then(()=>{setShareCopied(true);setTimeout(()=>{setShareCopied(false);setShowShareModal(false);},2000);});}} className="w-full py-3 rounded-2xl font-bold text-white text-sm mb-3 transition-all" style={{background:'linear-gradient(135deg,#10b981,#059669)'}}>

  };
  // ── COACH SETUP (inside Setup section of MoreView) ────────────────────────

    return (

        <p className="text-xs text-slate-400 mb-4">Connect to your GRI coach so they can see your progress and send you messages.</p>

              <div className="flex-1 bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-slate-400 text-xs font-mono overflow-hidden" style={{textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{advisorId}</div>
              <button onClick={copyAdvisorId} className="bg-slate-700 text-slate-300 px-3 rounded-xl text-sm hover:bg-slate-600 transition-colors">📋</button>

              <button onClick={saveCoachId} className="px-4 rounded-xl font-bold text-sm text-white transition-all" style={{background:coachSaved?'#10b981':'linear-gradient(135deg,#6366f1,#8b5cf6)',minWidth:'64px'}}>
                {coachSaved?'✓':'Save'}

  const MoreView = ({ data, updateField, saveData, openCoach, personality, setPersonality, onReopenOnboarding, onMilestone, weekNum, setWeekNum }) => {

    const [backupStatus, setBackupStatus] = useState('');
    const [coachProfile, setCoachProfile] = useState(()=>{try{const s=localStorage.getItem('coach-profile');return s?JSON.parse(s):{years:'',production:'',need:'',obstacle:'',style:'',why:'',drift:'',family:'',niche:''};}catch(e){return{years:'',production:'',need:'',obstacle:'',style:'',why:'',drift:'',family:'',niche:''};}}); 
    const updateProfile = (key, val) => {
      const p = {...coachProfile, [key]:val};
      setCoachProfile(p);
      localStorage.setItem('coach-profile', JSON.stringify(p));
    };

    const exportBackup = () => {
      try {
        const backup = {
          version: '1.0',
          exportedAt: new Date().toISOString(),
          plannerData: data,
          settings: {
            coachPersonality: localStorage.getItem('coach-personality'),
            apiKey: localStorage.getItem('claude-api-key'),
            coachProfile: localStorage.getItem('coach-profile'),
            summaryEmail: localStorage.getItem('summary-email'),
            summaryName: localStorage.getItem('summary-name'),
            summaryOptIn: localStorage.getItem('summary-optin'),
            coachCommitment: localStorage.getItem('coach-commitment'),
            coachCommitmentDate: localStorage.getItem('coach-commitment-date'),
            shareUsed: localStorage.getItem('share-used'),
          }
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sea-dashboard-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        setBackupStatus('✓ Backup downloaded successfully!');
        setTimeout(()=>setBackupStatus(''), 4000);
      } catch(e) {
        setBackupStatus('✗ Export failed — try again');
        setTimeout(()=>setBackupStatus(''), 4000);
      }
    };

    const importBackup = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const backup = JSON.parse(ev.target.result);
          if (!backup.plannerData) throw new Error('Invalid backup file');
          // Restore planner data
          localStorage.setItem('sea-planner-data', JSON.stringify(backup.plannerData));
          // Restore settings
          if (backup.settings) {
            const s = backup.settings;
            if (s.coachPersonality) localStorage.setItem('coach-personality', s.coachPersonality);
            if (s.apiKey) localStorage.setItem('claude-api-key', s.apiKey);
            if (s.coachProfile) localStorage.setItem('coach-profile', s.coachProfile);
            if (s.summaryEmail) localStorage.setItem('summary-email', s.summaryEmail);
            if (s.summaryName) localStorage.setItem('summary-name', s.summaryName);
            if (s.summaryOptIn) localStorage.setItem('summary-optin', s.summaryOptIn);
            if (s.coachCommitment) localStorage.setItem('coach-commitment', s.coachCommitment);
            if (s.coachCommitmentDate) localStorage.setItem('coach-commitment-date', s.coachCommitmentDate);
            if (s.shareUsed) localStorage.setItem('share-used', s.shareUsed);
          }
          setBackupStatus('✓ Backup restored! Reloading...');
          setTimeout(()=>window.location.reload(), 1500);
        } catch(err) {
          setBackupStatus('✗ Invalid backup file — please try again');
          setTimeout(()=>setBackupStatus(''), 4000);
        }
      };
      reader.readAsText(file);
      e.target.value = ''; // reset input so same file can be re-selected
    };

    const anvil = data.anvilProject||{project:'',cadence:'',why:'',log:[]};
    const notes = data.notes||[];
    const TAG_COLORS = {Business:'bg-blue-900/50 text-blue-300',Personal:'bg-purple-900/50 text-purple-300',Ideas:'bg-yellow-900/50 text-yellow-300',Goals:'bg-green-900/50 text-green-300',Reflection:'bg-indigo-900/50 text-indigo-300'};

    const SECTIONS = [
      {id:'weekly',label:'Weekly Ritual',icon:'📋',desc:'Your 7-step weekly planning ritual'},
      {id:'vision',label:'Vision & Goals',icon:'🎯',desc:'3-year, 1-year, 120-day vision + 4 goals'},
      {id:'messes',label:'Messes to Clean Up',icon:'🧹',desc:`${(data.weeks[weekNum-1]?.messes||[]).filter(m=>m.description?.trim()&&!m.completed).length} active messes`},
      {id:'profile',label:'Coach Profile',icon:'🧠',desc:'Help your coach know you better — takes 3 minutes'},
      {id:'setup',label:'Setup & Settings',icon:'⚙️',desc:'Coach personality, start date, routines'},
    ];

    if (!section) return (
      <div className="page-content px-4 py-5 space-y-3">
        <div className="mb-4">
          <h2 className="text-2xl font-bold text-white">More</h2>
          <p className="text-slate-400 text-sm">Vision, Anvil, Notes, Settings</p>
        </div>
        {SECTIONS.map(s=>(
          <button key={s.id} onClick={()=>setSection(s.id)} className="w-full flex items-center gap-4 p-4 bg-slate-800/60 rounded-2xl border border-slate-700 hover:border-slate-600 transition-all text-left">
            <span className="text-3xl">{s.icon}</span>
            <div className="flex-1">
              <p className="font-semibold text-white">{s.label}</p>
              <p className="text-xs text-slate-400 mt-0.5">{s.desc}</p>
            </div>
            <ChevRight/>
          </button>
        ))}
        <CoachMessages advisorId={getOrCreateAdvisorId()}/>
        <button onClick={onReopenOnboarding} className="w-full flex items-center gap-4 p-4 rounded-2xl border transition-all text-left" style={{background:'linear-gradient(135deg,rgba(59,130,246,0.1),rgba(139,92,246,0.1))',borderColor:'rgba(99,102,241,0.3)'}}>
          <span className="text-3xl">🔄</span>
          <div className="flex-1">
            <p className="font-semibold text-white">Review My Setup</p>
            <p className="text-xs text-slate-400 mt-0.5">Edit your foundation — goals, Anvil, vision & more</p>
          </div>
          <ChevRight/>
        </button>
        <button onClick={()=>window.print()} className="w-full flex items-center gap-4 p-4 bg-slate-800/60 rounded-2xl border border-slate-700 hover:border-slate-600 transition-all text-left">
          <span className="text-3xl">🖨️</span>
          <div className="flex-1"><p className="font-semibold text-white">Print / Save PDF</p><p className="text-xs text-slate-400 mt-0.5">Print current view</p></div>
        </button>
        <div className="mt-4 p-4 bg-slate-800/30 rounded-2xl border border-slate-700">
          <div className="flex items-center justify-between mb-2">
            <p className="text-xs text-slate-400 font-medium">Backup</p>
          </div>
          <div className="flex gap-2">
            <button onClick={()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`sea-planner-${new Date().toISOString().split('T')[0]}.json`;a.click();}} className="flex-1 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs text-white">📥 Export</button>
            <button onClick={()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{setData(JSON.parse(ev.target.result));alert('Restored!');}catch(e){alert('Error: '+e.message);}};r.readAsText(e.target.files[0]);};i.click();}} className="flex-1 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs text-white">📤 Import</button>
            <button onClick={()=>{if(confirm('Clear ALL data?')){localStorage.clear();window.location.reload();}}} className="flex-1 py-2 bg-red-900/30 hover:bg-red-900/50 rounded-xl text-xs text-red-400">🗑️ Clear</button>
          </div>
        </div>
      </div>
    );

    return (
      <div className="page-content px-4 py-5">
        <button onClick={()=>setSection(null)} className="flex items-center gap-2 text-slate-400 hover:text-white mb-5 transition-colors">
          <ChevLeft/><span className="text-sm">Back</span>
        </button>

        {/* Vision & Goals */}
        {/* Weekly Ritual */}
        {section==='weekly' && (
          <WeekView data={data} updateField={updateField} weekNum={weekNum} setWeekNum={setWeekNum} openCoach={openCoach} onPrint={()=>window.print()} onMilestone={onMilestone} onBack={()=>setSection(null)}/>
        )}

        {section==='messes' && (
          <div className="space-y-4">
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-bold text-white">🧹 Messes</h2>

              {(data.weeks[weekNum-1].messes||[]).length===0&&(
                <div className="text-center py-8 text-slate-500"><div className="text-4xl mb-2">✨</div><p className="text-sm">No messes — nice work!</p></div>
              )}
              {(data.weeks[weekNum-1].messes||[]).map((mess,mi)=>{
                const upd=(f,v)=>{const ws=JSON.parse(JSON.stringify(data.weeks));const m=ws[weekNum-1].messes||[];m[mi]={...m[mi],[f]:v};ws[weekNum-1].messes=m;updateField('weeks',ws);};

                      <input type="date" value={mess.byWhen||''} onChange={e=>upd('byWhen',e.target.value)} className="bg-slate-700/50 border border-slate-600/50 rounded-lg p-2 text-white text-xs focus:outline-none"/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {section==='vision' && (

            <h2 className="text-xl font-bold text-white">Vision & Goals</h2>
            {[{k:'vision3Year',label:'3-Year Vision',color:'blue',ph:'Where are you in 3 years?'},{k:'vision1Year',label:'1-Year Vision',color:'purple',ph:'What happens this year?'},{k:'vision120Day',label:'120-Day Vision',color:'green',ph:'Who will you be in 120 days?'}].map(({k,label,color,ph})=>(
              <div key={k} className="bg-slate-800/60 rounded-2xl p-5 border border-slate-700">
                <div className="flex items-center justify-between mb-3">
                  <h3 className={`text-sm font-bold text-${color}-400 uppercase tracking-wide`}>{label}</h3>
                  <button onClick={()=>openCoach({section:k})} className="text-xs text-purple-400 px-2 py-1 bg-purple-500/10 rounded-lg">Coach</button>
                </div>
                <textarea value={data[k]||''} onChange={e=>updateField(k,e.target.value)} placeholder={ph} rows={3} className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm resize-none focus:outline-none"/>
              </div>

                  <input value={g.measurement||''} onChange={e=>{const gs=JSON.parse(JSON.stringify(data.goals));gs[i]={...gs[i],measurement:e.target.value};updateField('goals',gs);}} placeholder="How will you measure success?" className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:outline-none mb-2"/>
                  <textarea value={g.impact||''} onChange={e=>{const gs=JSON.parse(JSON.stringify(data.goals));gs[i]={...gs[i],impact:e.target.value};updateField('goals',gs);}} placeholder="Why does this matter?" rows={2} className="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl p-3 text-white placeholder-slate-500 text-sm resize-none focus:outline-none"/>
                  {g.title?.trim() && (()=>{

                    const colors=['#f97316','#3b82f6','#10b981','#a855f7'];

                    return(
                      <div className="mt-3 pt-3 border-t border-slate-700">
                        <div className="flex justify-between items-center mb-2">
                          <span className="text-xs text-slate-400 font-semibold uppercase tracking-wide">Progress</span>
                          <span className="text-sm font-black" style={{color:col}}>{pct}%</span>
                        </div>
                        <div className="h-2 bg-slate-700 rounded-full overflow-hidden mb-2">
                          <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,backgroundColor:col}}/>
                        </div>
                        <input type="range" min="0" max="100" step="5" value={pct}
                          onChange={e=>{const newPct=parseInt(e.target.value);const gs=JSON.parse(JSON.stringify(data.goals));gs[i]={...gs[i],completion:newPct};updateField('goals',gs);const milestones=[25,50,75,100];if(milestones.includes(newPct)&&newPct>pct&&onMilestone)onMilestone({title:g.title,pct:newPct});}}
                          className="w-full h-2 rounded-full appearance-none cursor-pointer" style={{accentColor:col}}/>
                      </div>
                    );
                  })()}

  const calcWeekNum = (startDate) => {
    if (!startDate) return 1;
    const [y,m,d] = startDate.split('-').map(Number);
    const start = new Date(y, m-1, d);
    const dow = start.getDay();
    if (dow !== 1) { const adj = dow===0?1:8-dow; start.setDate(start.getDate()+adj); }
    const now = new Date(); now.setHours(0,0,0,0);
    const diffDays = Math.floor((now - start) / (24*60*60*1000));
    const week = Math.floor(diffDays / 7) + 1;
    return Math.max(1, Math.min(17, week));
  };

        for(let i=0;i<keys.length-1;i++)cur=cur[keys[i]];

      for (let i=0;i<unique.length;i++){const exp=new Date(now);exp.setDate(now.getDate()-i);if(unique[i].toDateString()===exp.toDateString())streak++;else break;}
