  // ── JOURNAL VIEW ──────────────────────────────────────────────────────────
  const JournalView = ({ data, updateField }) => {
    const [newNote, setNewNote] = useState('');
    const [noteTitle, setNoteTitle] = useState('');
    const [noteTag, setNoteTag] = useState('Personal');
    const [filter, setFilter] = useState('All');
    const [search, setSearch] = useState('');
    const [editNote, setEditNote] = useState(null); // {id, title, content, tag}
    const TAG_COLORS = {Business:'bg-blue-900/50 text-blue-300',Personal:'bg-purple-900/50 text-purple-300',Ideas:'bg-yellow-900/50 text-yellow-300',Goals:'bg-green-900/50 text-green-300',Reflection:'bg-indigo-900/50 text-indigo-300',Daily:'bg-slate-700 text-slate-300'};
    const TAG_BORDER = {Business:'#3b82f6',Personal:'#a855f7',Ideas:'#f59e0b',Goals:'#10b981',Reflection:'#6366f1',Daily:'#475569'};
    const notes = data.notes || [];
    const TAGS = ['Business','Personal','Ideas','Goals','Reflection'];

    const buildFeed = () => {
      const entries = [...notes.map(n=>({...n, source:'note'}))];
      (data.dailyPlans||[]).forEach((week, wi) => {
        (week||[]).forEach((day, di) => {
          if (!day) return;
          const dayDate = (() => {
            if (!data.startDate) return null;
            const [y,m,d] = data.startDate.split('-').map(Number);
            const start = new Date(y,m-1,d);
            const dow = start.getDay();
            if (dow!==1){const adj=dow===0?1:8-dow;start.setDate(start.getDate()+adj);}
            const d2 = new Date(start);
            d2.setDate(d2.getDate() + wi*7 + di);
            return d2.toISOString();
          })();
          if (day.reflection?.trim()) entries.push({id:`ref-${wi}-${di}`,title:'💭 Daily Reflection',content:day.reflection.trim(),tag:'Reflection',date:dayDate||new Date().toISOString(),readOnly:true});
          if (day.notes?.trim()) entries.push({id:`note-${wi}-${di}`,title:'📅 Daily Note',content:day.notes.trim(),tag:'Daily',date:dayDate||new Date().toISOString(),readOnly:true});
        });
      });
      return entries.sort((a,b) => new Date(b.date) - new Date(a.date));
    };

    const saveNew = () => {
      if (!newNote.trim()) return;
      const n = {id:Date.now(),title:noteTitle.trim()||'Note',content:newNote.trim(),tag:noteTag,date:new Date().toISOString()};
      updateField('notes',[n,...notes]);
      setNewNote(''); setNoteTitle('');
    };

    const saveEdit = () => {
      if (!editNote) return;
      const updated = notes.map(n => n.id===editNote.id ? {...n, title:editNote.title, content:editNote.content, tag:editNote.tag} : n);
      updateField('notes', updated);
      setEditNote(null);
    };

    const deleteNote = (id) => {
      updateField('notes', notes.filter(n => n.id !== id));
      setEditNote(null);
    };

    const feed = buildFeed();
    const filtered = feed
      .filter(e => filter==='All' || e.tag===filter)
      .filter(e => {
        if (!search.trim()) return true;
        const q = search.toLowerCase();
        return e.title?.toLowerCase().includes(q) || e.content?.toLowerCase().includes(q);
      });

    return (
      <div className="page-content px-4 py-5 space-y-4">
        {/* Header */}
        <div>
          <h2 className="text-xl font-bold text-white">Journal</h2>
          <p className="text-xs text-slate-400">{feed.length} {feed.length===1?'entry':'entries'} total</p>
        </div>

        {/* Search */}
        <div className="relative">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔍</span>
          <input
            value={search}
            onChange={e=>setSearch(e.target.value)}
            placeholder="Search entries..."
            className="w-full bg-slate-800/60 border border-slate-700 rounded-2xl pl-9 pr-4 py-3 text-white placeholder-slate-500 text-sm focus:border-indigo-500 focus:outline-none"
          />
          {search && (
            <button onClick={()=>setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white text-lg">×</button>

  // ── CoachMessageBox — pure vanilla JS textarea, React never touches it after mount ──
  const CoachMessageBox = ({ advisorId, coachId, coachName }) => {
    const wrapRef = useRef(null);
    useEffect(() => {
      const wrap = wrapRef.current;
      if (!wrap) return;
      // Build textarea and button purely in vanilla JS — immune to React re-renders
      const ta = document.createElement('textarea');
      ta.placeholder = 'Write a coaching message...';
      ta.rows = 2;
      ta.style.cssText = 'flex:1;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#f8fafc;font-size:16px;resize:none;font-family:inherit;min-width:0;width:100%;';
      const btn = document.createElement('button');
      btn.textContent = 'Send';
      btn.disabled = true;
      btn.style.cssText = 'padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;align-self:stretch;min-width:70px;background:#1e293b;color:#475569;transition:all 0.2s;flex-shrink:0;';
      ta.addEventListener('input', () => {
        const has = !!ta.value.trim();
        btn.disabled = !has;
        btn.style.background = has ? '#6366f1' : '#1e293b';
        btn.style.color = has ? 'white' : '#475569';
      });
      btn.addEventListener('click', async () => {
        const msg = ta.value.trim();
        if (!msg || btn.disabled) return;
        btn.disabled = true; btn.textContent = '...';
        try {
          const res = await fetch('/api/coach?action=send-message', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ advisorId, coachId, coachName: coachName||'Your Coach', message: msg })
          });
          const d = await res.json();
          if (d.success) {
            ta.value = ''; ta.dispatchEvent(new Event('input'));
            btn.textContent = '✓ Sent'; btn.style.background = '#22c55e'; btn.style.color = 'white';
            setTimeout(() => { btn.textContent = 'Send'; btn.style.background = '#1e293b'; btn.style.color = '#475569'; btn.disabled = true; }, 2500);
            return;
          }
        } catch(e) { alert('Failed to send. Please try again.'); }
        btn.disabled = !ta.value.trim(); btn.textContent = 'Send';
      });
      wrap.appendChild(ta);
      wrap.appendChild(btn);
      return () => { wrap.innerHTML = ''; };
    }, []); // eslint-disable-line — intentionally empty, props are stable for lifetime of card
    return (
      <div style={{borderTop:'1px solid #334155',paddingTop:'12px'}}>
        <div style={{fontSize:'10px',color:'#64748b',marginBottom:'8px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.06em'}}>Send Message</div>
        <div ref={wrapRef} style={{display:'flex',gap:'8px',alignItems:'flex-start'}}/>
      </div>
    );
  };

    // ── Coach sub-components (defined at module level to prevent remount on keypress) ──
  const CoachScoreRing = ({ score }) => {
    const pct = Math.min(100, Math.max(0, score||0));
    const r=28, cx=32, cy=32, circ=2*Math.PI*r, dash=(pct/100)*circ;
    const color = pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
    return (
      <svg width="64" height="64" viewBox="0 0 64 64" style={{flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e293b" strokeWidth="6"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="6"
          strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
          transform="rotate(-90 32 32)" style={{transition:'stroke-dasharray 0.5s'}}/>
        <text x="32" y="37" textAnchor="middle" fill={color} fontSize="13" fontWeight="bold">{Math.round(pct)}</text>
      </svg>
    );
  };
  const CoachGoalBar = ({ goals }) => {
    if (!goals?.length) return <span style={{color:'#64748b',fontSize:'12px'}}>No goals shared</span>;
    const colors = ['#f97316','#3b82f6','#10b981','#a855f7'];
    return (
      <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
        {goals.slice(0,4).map((g,i) => {
          const pct = g.target>0 ? Math.min(100,(g.current/g.target)*100) : (g.completion||0);
          return (
            <div key={i}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#94a3b8',marginBottom:'2px'}}>
                <span style={{maxWidth:'170px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.t || g.name}</span>
                <span style={{fontWeight:'bold',color:colors[i%4]}}>{Math.round(pct)}%</span>
              </div>
              <div style={{height:'4px',background:'#1e293b',borderRadius:'2px'}}>
                <div style={{height:'100%',width:`${pct}%`,background:colors[i%4],borderRadius:'2px',transition:'width 0.5s'}}/>

  // ── COACH DASHBOARD (shown at ?coach=ID) ──────────────────────────────────
  // ── CoachMessageModal — top-level modal, completely isolated from advisor list ──
  const CoachMessageModal = ({ advisorId, advisorName, coachId, coachName, onClose }) => {

        const res = await fetch(`${COACH_API}?action=send-message`, {
          method: 'POST', headers: {'Content-Type':'application/json'},

    );

                <button onClick={()=>setEditingName(true)} style={{background:'transparent',border:'1px solid #334155',borderRadius:'8px',padding:'7px 14px',color:coachName?'#f8fafc':'#94a3b8',cursor:'pointer',fontSize:'13px'}}>
                  {coachName || '✏️ Set your name'}
                </button>
              )}
              <div style={{fontSize:'11px',color:'#475569',marginTop:'4px'}}>Coach ID: {coachId}</div>
            </div>
          </div>
        )}

        {/* Coach link banner */}
        {embedded && (
          <div style={{background:'rgba(99,102,241,0.08)',padding:'10px 16px',borderRadius:'12px',marginBottom:'16px',border:'1px solid rgba(99,102,241,0.2)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}}>
            <span style={{fontSize:'12px',color:'#64748b'}}>📎 Share your coach link with advisors</span>
            <button onClick={copyCoachLink} style={{background:'#6366f1',color:'white',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'12px',fontWeight:'700'}}>📋 Copy Coach Link</button>
          </div>
        )}
        {!embedded && (
          <div style={{background:'#151d2e',padding:'10px 20px',borderBottom:'1px solid #1e293b',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}}>
            <span style={{fontSize:'12px',color:'#64748b'}}>📎 Share your coach link with advisors</span>
            <button onClick={copyCoachLink} style={{background:'#6366f1',color:'white',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'12px',fontWeight:'700'}}>📋 Copy Coach Link</button>
          </div>
        )}

        {/* Content */}
        <div style={{padding:embedded?'0':'20px',maxWidth:'720px',margin:'0 auto'}}>
          {loading && <div style={{textAlign:'center',padding:'60px',color:'#64748b'}}><div style={{fontSize:'36px',marginBottom:'12px'}}>⏳</div><div>Loading advisors...</div></div>}
          {error && (
            <div style={{background:'#450a0a',border:'1px solid #ef4444',borderRadius:'12px',padding:'16px',color:'#fca5a5',marginBottom:'16px'}}>
              ⚠️ {error}
              <button onClick={fetchAdvisors} style={{marginLeft:'12px',background:'#ef4444',color:'white',border:'none',borderRadius:'6px',padding:'4px 10px',cursor:'pointer',fontSize:'12px'}}>Retry</button>
            </div>
          )}
          {!loading && !error && advisors.length === 0 && (
            <div style={{textAlign:'center',padding:'60px 20px',color:'#64748b'}}>
              <div style={{fontSize:'52px',marginBottom:'16px'}}>👥</div>
              <div style={{fontSize:'17px',fontWeight:'700',color:'#94a3b8',marginBottom:'8px'}}>No advisors yet</div>
              <div style={{fontSize:'14px',lineHeight:'1.6'}}>Copy your coach link above and share it.<br/>Advisors appear here after they share their score.</div>
            </div>
          )}
          {!loading && advisors.length > 0 && (
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
              <span style={{color:'#64748b',fontSize:'13px'}}>{advisors.length} advisor{advisors.length!==1?'s':''}</span>
              <button onClick={fetchAdvisors} style={{background:'#1e293b',color:'#94a3b8',border:'1px solid #334155',borderRadius:'8px',padding:'6px 14px',cursor:'pointer',fontSize:'12px'}}>🔄 Refresh</button>
            </div>
          )}
          {advisors.map(advisor => {
            const d = advisor.advisorData || {};
            const score = d.s ?? d.score ?? 0;
            const streak = d.as ?? d.anvilStreak ?? d.streak ?? 0;
            const name = (d.n ?? d.name) || 'Unnamed Advisor';
            const goals = d.g ?? d.goals ?? [];
            const habits = d.hp ?? d.habitPct ?? d.habitCompletion ?? 0;
            const lastUpdated = advisor.lastUpdated ? new Date(advisor.lastUpdated).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
            const scoreColor = score>=80?'#22c55e':score>=50?'#f59e0b':'#ef4444';
            return (
              <div key={advisor.advisorId} style={{background:'#1e293b',borderRadius:'16px',padding:'20px',marginBottom:'16px',border:'1px solid #334155'}}>
                <div style={{display:'flex',alignItems:'center',gap:'16px',marginBottom:'16px'}}>
                  <CoachScoreRing score={score}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:'700',fontSize:'17px',color:'#f8fafc',marginBottom:'4px'}}>{name}</div>
                    <div style={{display:'flex',gap:'14px',flexWrap:'wrap'}}>
                      <span style={{fontSize:'12px',color:'#94a3b8'}}>🔥 {streak}-day streak</span>
                      <span style={{fontSize:'12px',color:'#94a3b8'}}>✅ {habits}% habits</span>
                    </div>
                    {lastUpdated && <div style={{fontSize:'11px',color:'#475569',marginTop:'3px'}}>Updated {lastUpdated}</div>}
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontSize:'10px',color:'#64748b',marginBottom:'2px',textTransform:'uppercase',letterSpacing:'0.05em'}}>S.E.A. Score</div>
                    <div style={{fontSize:'30px',fontWeight:'900',color:scoreColor}}>{Math.round(score)}</div>
                  </div>
                </div>
                <CoachGoalBar goals={goals}/>
                <button onClick={()=>setMessaging({advisorId:advisor.advisorId, name})}
                  style={{marginTop:'14px',width:'100%',padding:'10px',borderRadius:'10px',border:'1px solid #6366f1',background:'rgba(99,102,241,0.1)',color:'#a78bfa',cursor:'pointer',fontSize:'13px',fontWeight:'600'}}>
                  💬 Send Message to {name.split(' ')[0]}
                </button>
              </div>
            );
          })}
        </div>
      </div>
    );
  };


  const CoachMessages = ({ advisorId }) => {
    const [messages, setMessages] = useState([]);
    const [loading, setLoading] = useState(false);
    const [open, setOpen] = useState(false);
    const [unread, setUnread] = useState(0);

    const fetchMessages = useCallback(async () => {
      if (!advisorId) return;
      setLoading(true);
      try {
        const res = await fetch(`${COACH_API}?action=get-messages&advisorId=${encodeURIComponent(advisorId)}`);
        const data = await res.json();
        if (Array.isArray(data)) {
          setMessages([...data].reverse());
          setUnread(data.filter(m=>!m.read).length);
        }
      } catch(e) { /* silent — bonus feature */ }
      setLoading(false);
    }, [advisorId]);

    useEffect(() => {
      fetchMessages();
      const t = setInterval(fetchMessages, 5*60*1000);
      return () => clearInterval(t);
    }, [fetchMessages]);

    const markAllRead = async () => {
      if (unread===0) return;
      setUnread(0);
      setMessages(m=>m.map(msg=>({...msg,read:true})));
      fetch(`${COACH_API}?action=mark-read`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({advisorId})}).catch(()=>{});
    };

    const toggle = () => { if (!open && unread>0) markAllRead(); setOpen(o=>!o); };
    const fmt = ts => { const d=new Date(ts),now=new Date(); return (now-d)<86400000?d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };

    return (
      <div className={`bg-slate-800/60 rounded-2xl border overflow-hidden ${unread>0?'border-purple-500/50':'border-slate-700'}`} style={{transition:'border-color 0.3s'}}>
        <button onClick={toggle} className="w-full p-4 flex items-center justify-between text-left" style={{background:'transparent',border:'none',cursor:'pointer',color:'#f8fafc'}}>
          <div className="flex items-center gap-3">
            <span className="text-2xl">💬</span>
            <div>
              <p className="font-bold text-white text-sm">Messages from Coach</p>
              <p className="text-xs text-slate-400 mt-0.5">{loading?'Checking...':(messages.length===0?'No messages yet':`${messages.length} message${messages.length!==1?'s':''}`)}</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {unread>0&&<span className="bg-purple-600 text-white text-xs font-bold rounded-full px-2 py-0.5">{unread} new</span>}
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{transform:open?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s',color:'#64748b'}}><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </button>
        {open && (
          <div className="border-t border-slate-700 p-4 space-y-3">
            {messages.length===0 ? (
              <div className="text-center py-6 text-slate-500">
                <div className="text-3xl mb-2">📭</div>
                <p className="text-sm">Your coach hasn't sent any messages yet.</p>
              </div>
            ) : messages.map(msg => (
              <div key={msg.id||msg.timestamp} className="rounded-xl p-3" style={{background:msg.read?'rgba(15,23,42,0.8)':'rgba(99,102,241,0.08)',borderLeft:`3px solid ${msg.read?'#334155':'#8b5cf6'}`}}>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-xs font-bold text-purple-400">{msg.coachName||'Your Coach'}</span>
                  <span className="text-xs text-slate-500">{fmt(msg.timestamp)}</span>
                </div>
                <p className="text-sm text-slate-200 leading-relaxed">{msg.message}</p>
              </div>
            ))}
            <button onClick={fetchMessages} className="w-full py-2 text-xs text-slate-500 hover:text-slate-300 border border-slate-700 rounded-xl transition-colors">🔄 Refresh messages</button>
          </div>
        )}
      </div>
    );
  };

  // ── APP ROOT ───────────────────────────────────────────────────────────────
  const AppRoot = () => {
    // Check for share link first
    const urlParams = new URLSearchParams(window.location.search);
    const shareParam = urlParams.get('share');
    if (shareParam) {
      try {
        const padded = shareParam.replace(/-/g,'+').replace(/_/g,'/');
        const shareData = JSON.parse(decodeURIComponent(escape(atob(padded))));
        return <ShareView shareData={shareData}/>;
      } catch(e) {
        // Bad share link — fall through to normal app
      }
    }

    // Check for coach dashboard
    const coachParam = urlParams.get('coach');
    if (coachParam) {
      return <CoachDashboard coachId={coachParam}/>;
    }

    const [onboardingDone, setOnboardingDone] = useState(false);
    const [onboardingData, setOnboardingData] = useState(null);
    const [showingOnboarding, setShowingOnboarding] = useState(false);
    const hasData = ()=>{try{const s=localStorage.getItem('sea-planner-data');if(!s)return false;const p=JSON.parse(s);return!!(p.slightEdge||p.goals?.some(g=>g.title));}catch(e){return false;}};
    const [showOnboarding] = useState(()=>!hasData());

    const getExistingData = () => {
      try {
        const s = localStorage.getItem('sea-planner-data');
        const p = s ? JSON.parse(s) : {};
        const pers = localStorage.getItem('coach-personality');
        return {
          slightEdge: p.slightEdge||'', yearTheme: p.yearTheme||'',
          vision120Day: p.vision120Day||'', startDate: p.startDate||'',
          goals: p.goals||[{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''}],
          wheelOfJohn: p.weeks?.[0]?.wheelOfJohn||{family:5,fun:5,fitness:5,finance:5,faith:5},
          anvil: p.anvilProject ? {project:p.anvilProject.project||'',cadence:p.anvilProject.cadence||'',why:p.anvilProject.why||''} : {project:'',cadence:'',why:''},
          personality: pers ? JSON.parse(pers) : {style:2,tone:2,approach:2,energy:2},
          apiKey: localStorage.getItem('claude-api-key')||'',
          coachProfile: (() => { try { const s=localStorage.getItem('coach-profile'); return s?JSON.parse(s):{years:'',production:'',need:'',obstacle:'',style:'',why:'',drift:'',family:'',niche:''}; } catch(e) { return {years:'',production:'',need:'',obstacle:'',style:'',why:'',drift:'',family:'',niche:''}; } })()
        };
      } catch(e) { return {slightEdge:'',yearTheme:'',vision120Day:'',startDate:'',goals:[{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''},{title:'',impact:'',measurement:''}],anvil:{project:'',cadence:'',why:''},personality:{style:2,tone:2,approach:2,energy:2}}; }
    };

    const handleOnboardingComplete = (d) => { setOnboardingData(d); setOnboardingDone(true); setShowingOnboarding(false); };
    const handleReopenOnboarding = () => setShowingOnboarding(true);

    if ((showOnboarding && !onboardingDone) || showingOnboarding) {
      return <OnboardingFlow onComplete={handleOnboardingComplete} initialData={getExistingData()}/>;
    }
    return <SEAPlannerApp onboardingData={onboardingData} onReopenOnboarding={handleReopenOnboarding}/>;
  };

  ReactDOM.render(<AppRoot/>, document.getElementById('root'));
</script>
</body>
</html>
